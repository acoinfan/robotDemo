<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MesaSkill Pick Demo</title>
    <link rel="stylesheet" href="./mesa_skill_demo.css">
  </head>
  <body>
    <main class="shell">
      <section class="stage">
        <canvas id="scene" width="1100" height="760"></canvas>
      </section>
      <aside class="panel">
        <div class="field">
          <label for="taskSelect">Task</label>
          <select id="taskSelect"></select>
        </div>
        <div class="toolbar" aria-label="Playback controls">
          <button id="playButton" type="button">Play</button>
          <button id="resetButton" type="button">Reset</button>
        </div>
        <input id="timeline" class="timeline" type="range" min="0" max="1000" value="0">
        <dl class="stats">
          <div>
            <dt>Object</dt>
            <dd id="objectName">-</dd>
          </div>
          <div>
            <dt>Move</dt>
            <dd id="moveDelta">-</dd>
          </div>
          <div>
            <dt>Grip</dt>
            <dd id="gripWidth">-</dd>
          </div>
          <div>
            <dt>Variant</dt>
            <dd id="variantName">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script src="./mesa_skill_demo.js"></script>
  </body>
</html>
