<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1043_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1043_1", "boundary": [0.0, 88.9, 0.0, 63.2], "objects": [{"uid": "0e8155b9bf94494f9754901c53764942", "name": "10_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "10_pen_1", "position": [16.2, 25.1, 1.0], "size": [5.0, 13.7, 1.7], "rotation": [-0.05620850622653961, -0.008076888509094715, -0.14200469851493835, 0.9882358312606812], "z_rotation": -0.28369301557540894, "moved": false, "glb": null}, {"uid": "7cd5c7e5be624ca48e072326ed6a1da2", "name": "11_sticky_note_pad_1_7cd5c7e5be624ca48e072326ed6a1da2", "instance": "11_sticky_note_pad_1", "position": [16.6, 38.6, 0.6], "size": [7.4, 7.4, 1.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "1_mouse_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "1_mouse_0", "position": [69.6, 17.4, 1.1], "size": [4.9, 9.5, 1.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e12136221cec4d19b9ca2384ee04a211", "name": "2_laptop_0_e12136221cec4d19b9ca2384ee04a211", "instance": "2_laptop_0", "position": [42.7, 47.4, 12.1], "size": [39.5, 27.6, 24.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "4f1f5b85ed51457bbfd5d96981d4f912", "name": "3_globe_0_4f1f5b85ed51457bbfd5d96981d4f912", "instance": "3_globe_0", "position": [13.6, 51.8, 8.9], "size": [13.1, 13.9, 17.8], "rotation": [0.0, 0.0, 0.9289595484733582, 0.37018123269081116], "z_rotation": 2.3831844329833984, "moved": false, "glb": null}, {"uid": "5f6ac3f1-15f7-48ad-9a6a-b069d712544f", "name": "4_mouse_pad_0_5f6ac3f1-15f7-48ad-9a6a-b069d712544f", "instance": "4_mouse_pad_0", "position": [70.3, 18.4, 0.1], "size": [18.5, 25.8, 0.2], "rotation": [0.0, 0.0, 0.7088603973388672, 0.7053488492965698], "z_rotation": 1.575762391090393, "moved": false, "glb": null}, {"uid": "7cd5c7e5be624ca48e072326ed6a1da2", "name": "5_sticky_note_pad_0_7cd5c7e5be624ca48e072326ed6a1da2", "instance": "5_sticky_note_pad_0", "position": [69.4, 32.5, 1.0], "size": [8.5, 7.2, 1.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "6_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "6_pen_0", "position": [46.6, 18.2, 7.2], "size": [5.8, 15.5, 2.0], "rotation": [-0.07259739935398102, 0.0, 0.0, 0.9973613619804382], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "7_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "7_notebook_0", "position": [41.8, 19.3, 3.6], "size": [26.0, 29.8, 7.2], "rotation": [0.0, 0.0, -0.7069926261901855, 0.7072209119796753], "z_rotation": -1.5704734325408936, "moved": false, "glb": null}, {"uid": "76703d06-7adf-442e-be95-7dde6ce265e6", "name": "8_calculator_0_76703d06-7adf-442e-be95-7dde6ce265e6", "instance": "8_calculator_0", "position": [70.3, 51.0, 2.2], "size": [12.5, 20.4, 4.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "9_pen_holder_0_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "9_pen_holder_0", "position": [81.4, 40.0, 8.6], "size": [7.3, 10.7, 17.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "76703d06-7adf-442e-be95-7dde6ce265e6", "name": "8_calculator_0_76703d06-7adf-442e-be95-7dde6ce265e6", "instance": "8_calculator_0", "position": [16.236143112182617, 31.835906982421875, 3.356442928314209], "size": [12.5, 20.4, 4.2], "rotation": [-0.053219783730184614, -0.188772570893901, 0.9443529380173107, 0.26406457459472454], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "76703d06-7adf-442e-be95-7dde6ce265e6", "object_instance": "8_calculator_0", "position_delta": 57.37159962053728, "rotation_delta": 2.6071247673187146, "grasp_width": 0.08, "poses": [[0.703, 0.51, 0.12200000000000001], [0.703, 0.51, 0.022000000000000002], [0.703, 0.51, 0.12200000000000001], [0.1623614311218262, 0.31835906982421874, 0.1335644292831421], [0.1623614311218262, 0.31835906982421874, 0.03356442928314209], [0.1623614311218262, 0.31835906982421874, 0.1335644292831421]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
