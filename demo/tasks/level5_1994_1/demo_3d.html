<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level5_1994_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",

      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level5_1994_1", "boundary": [0.0, 119.2, 0.0, 67.1], "objects": [{"uid": "20067975d06343489bd455c6c5821f33", "name": "10_cup_0_20067975d06343489bd455c6c5821f33", "instance": "10_cup_0", "position": [93.0, 16.1, 2.6], "size": [10.2, 10.4, 5.0], "rotation": [0.0, 0.0, -0.952662467956543, 0.30403003096580505], "z_rotation": -2.523752450942993, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "11_computer_0_ef18ca96fff24272916d706db1f63d5a", "instance": "11_computer_0", "position": [62.3, 46.0, 14.5], "size": [36.8, 36.1, 28.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "ca13bdd67bb14e0a9f9579ae3152d1d3", "name": "12_pen_0_ca13bdd67bb14e0a9f9579ae3152d1d3", "instance": "12_pen_0", "position": [46.1, 15.8, 0.4], "size": [0.8, 11.8, 0.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "13_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "13_pen_1", "position": [101.9, 48.5, 12.6], "size": [3.4, 9.0, 1.0], "rotation": [-0.028030436486005783, -0.04101121425628662, 0.5635775923728943, 0.8245681524276733], "z_rotation": 1.200778841972351, "moved": true, "glb": null}, {"uid": "7cd5c7e5be624ca48e072326ed6a1da2", "name": "14_sticky_note_1_7cd5c7e5be624ca48e072326ed6a1da2", "instance": "14_sticky_note_1", "position": [36.0, 10.1, 1.0], "size": [9.8, 9.8, 1.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "2d090a51da824b8a9f3550f5e2f105e0", "name": "15_pen_2_2d090a51da824b8a9f3550f5e2f105e0", "instance": "15_pen_2", "position": [47.8, 16.2, 0.4], "size": [0.6, 12.6, 0.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "16_sticky_note_2_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "16_sticky_note_2", "position": [37.4, 21.0, 0.7], "size": [9.7, 9.8, 1.2], "rotation": [0.06737068295478821, -0.059679001569747925, 0.6950187683105469, 0.7133362293243408], "z_rotation": 1.5435798168182373, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "17_pen_3_0e8155b9bf94494f9754901c53764942", "instance": "17_pen_3", "position": [101.6, 39.5, 12.7], "size": [3.7, 10.0, 1.1], "rotation": [-0.02496800571680069, -0.036070119589567184, 0.5686065554618835, 0.8214390873908997], "z_rotation": 1.2122234106063843, "moved": true, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "18_pen_4_0e8155b9bf94494f9754901c53764942", "instance": "18_pen_4", "position": [101.9, 42.2, 12.6], "size": [3.7, 10.1, 1.1], "rotation": [-0.03508780524134636, -0.04911369830369949, 0.58025062084198, 0.8121982216835022], "z_rotation": 1.242913007736206, "moved": true, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "19_pen_5_0e8155b9bf94494f9754901c53764942", "instance": "19_pen_5", "position": [102.0, 45.1, 12.7], "size": [3.6, 9.6, 1.1], "rotation": [-0.03561686724424362, -0.05021010339260101, 0.5774757266044617, 0.8140836358070374], "z_rotation": 1.2363224029541016, "moved": true, "glb": null}, {"uid": "a89ffa6be8184f0f96afa26f73ae19d2", "name": "1_mouse_0_a89ffa6be8184f0f96afa26f73ae19d2", "instance": "1_mouse_0", "position": [79.0, 15.4, 2.9], "size": [5.3, 16.7, 5.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0b29453835364f39858de181ee5e891f", "name": "2_lamp_0_0b29453835364f39858de181ee5e891f", "instance": "2_lamp_0", "position": [18.6, 41.9, 21.8], "size": [23.3, 24.7, 42.8], "rotation": [0.0, 0.0, 0.8190224766731262, 0.5737614631652832], "z_rotation": 1.9194103479385376, "moved": false, "glb": null}, {"uid": "76703d06-7adf-442e-be95-7dde6ce265e6", "name": "4_calculator_0_76703d06-7adf-442e-be95-7dde6ce265e6", "instance": "4_calculator_0", "position": [21.5, 25.3, 1.3], "size": [7.6, 12.4, 2.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "4f1f5b85ed51457bbfd5d96981d4f912", "name": "5_globe_0_4f1f5b85ed51457bbfd5d96981d4f912", "instance": "5_globe_0", "position": [36.7, 50.3, 8.5], "size": [12.7, 13.4, 17.2], "rotation": [0.0, 0.0, -0.6626918911933899, 0.7488921880722046], "z_rotation": -1.448815107345581, "moved": false, "glb": null}, {"uid": "8fdfc2b157794f97b1bea374b76a568a", "name": "6_drawer_0_8fdfc2b157794f97b1bea374b76a568a", "instance": "6_drawer_0", "position": [95.9, 43.2, 6.1], "size": [23.0, 23.0, 12.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "8_sticky_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "8_sticky_note_0", "position": [36.0, 31.9, 0.7], "size": [9.7, 9.7, 1.3], "rotation": [0.05428754538297653, -0.05313718318939209, 0.6974735856056213, 0.7125727534294128], "z_rotation": 1.5491306781768799, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "9_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "9_notebook_0", "position": [61.7, 14.3, 2.5], "size": [20.0, 22.9, 5.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "0e8155b9bf94494f9754901c53764942", "name": "19_pen_5_0e8155b9bf94494f9754901c53764942", "instance": "19_pen_5", "position": [29.65972137451172, 44.57130813598633, 0.26773133873939514], "size": [3.6, 9.6, 1.1], "rotation": [0.0, 0.0, -0.9316395334806464, 0.35994599025870455], "z_rotation": 1.2363224029541016, "moved": true, "glb": null}, "plan": {"object_uid": "0e8155b9bf94494f9754901c53764942", "object_instance": "19_pen_5", "position_delta": 73.4027024759042, "rotation_delta": 2.6459792983711985, "grasp_width": 0.028800000000000006, "poses": [[1.02, 0.451, 0.227], [1.02, 0.451, 0.127], [1.02, 0.451, 0.227], [0.2965972137451172, 0.4457130813598633, 0.10267731338739396], [0.2965972137451172, 0.4457130813598633, 0.0026773133873939513], [0.2965972137451172, 0.4457130813598633, 0.10267731338739396]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
