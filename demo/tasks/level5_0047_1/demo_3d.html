  <style>

<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>

    const data = {"task": "level5_0047_1", "boundary": [0.0, 82.0, 0.0, 74.5], "objects": [{"uid": "023684a09b844af085910652f7064c6e", "name": "10_cup_candle_0_023684a09b844af085910652f7064c6e", "instance": "10_cup_candle_0", "position": [40.2, 62.2, 0.7], "size": [16.8, 17.8, 1.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e76a8dfa67ca4fd887ff26ce5bfa8afe", "name": "11_glass_0_e76a8dfa67ca4fd887ff26ce5bfa8afe", "instance": "11_glass_0", "position": [14.0, 36.4, 4.9], "size": [8.3, 8.3, 9.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "c98a9a20080641fda4b181640c12e381", "name": "12_cookie_0_c98a9a20080641fda4b181640c12e381", "instance": "12_cookie_0", "position": [40.2, 17.5, 0.8], "size": [5.2, 5.2, 0.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "c98a9a20080641fda4b181640c12e381", "name": "13_cookie_1_c98a9a20080641fda4b181640c12e381", "instance": "13_cookie_1", "position": [44.2, 14.0, 0.7], "size": [5.0, 5.0, 0.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "222643de666b4dad9924bcf03fc7260a", "name": "14_stack_0_222643de666b4dad9924bcf03fc7260a", "instance": "14_stack_0", "position": [52.2, 36.7, 6.4], "size": [9.7, 8.5, 12.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "2db412250fa948adb4410e4eec904500", "name": "15_plate_2_2db412250fa948adb4410e4eec904500", "instance": "15_plate_2", "position": [69.0, 19.7, 0.7], "size": [9.1, 9.1, 0.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "c98a9a20080641fda4b181640c12e381", "name": "16_cookie_2_c98a9a20080641fda4b181640c12e381", "instance": "16_cookie_2", "position": [45.8, 17.6, 0.8], "size": [4.3, 4.3, 0.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "793973cff95441a184ccba99df5c7c3f" on": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "58b25e6a06df4ca1bf536bf0c94837e7", "name": "4_cup_0_58b25e6a06df4ca1bf536bf0c94837e7", "instance": "4_cup_0", "position": [15.7, 19.0, 4.6], "size": [10.6, 10.6, 9.1], "rotation": [0.0, 0.0, -0.9977884292602539, 0.06647025793790817], "z_rotation": -3.008553981781006, "moved": false, "glb": null}, {"uid": "a230b0ccb6a240899cc745216b1f692a", "name": "5_tray_0_a230b0ccb6a240899cc745216b1f692a", "instance": "5_tray_0", "position": [41.7, 39.8, 0.4], "size": [43.0, 25.9, 0.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "c98a9a20080641fda4b181640c12e381", "name": "6_plate_1_c98a9a20080641fda4b181640c12e381", "instance": "6_plate_1", "position": [42.7, 21.4, 0.8], "size": [4.8, 4.8, 0.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "cd91c2689e81452395f55d42f70c0dfe", "name": "7_book_0_cd91c2689e81452395f55d42f70c0dfe", "instance": "7_book_0", "position": [29.7, 37.0, 1.0], "size": [10.9, 16.2, 1.7], "rotation": [0.0, 0.0, 0.22585298120975494, 0.9741613864898682], "z_rotation": 0.4556370973587036, "moved": false, "glb": null}, {"uid": "2b2ae61f794d4c58837abec57c02c2fc", "name": "8_water_pitcher_0_2b2ae61f794d4c58837abec57c02c2fc", "instance": "8_water_pitcher_0", "position": [71.1, 50.5, 6.9], "size": [9.8, 7.4, 13.6], "rotation": [-0.08469261229038239, 0.003599870717152953, 0.9955018162727356, 0.042313188314437866], "z_rotation": 3.0566351413726807, "moved": false, "glb": null}], "target": {"uid": "793973cff95441a184ccba99df5c7c3f", "name": "17_plates_0_793973cff95441a184ccba99df5c7c3f", "instance": "17_plates_0", "position": [38.550655364990234, 38.032493591308594, 5.349999904632568], "size": [8.4, 7.6, 10.5], "rotation": [-0.2702884176625026, 0.49968094684790487, -0.8176873527179533, 0.09300814931922452], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "793973cff95441a184ccba99df5c7c3f", "object_instance": "17_plates_0", "position_delta": 25.914886057848296, "rotation_delta": 2.955307116064388, "grasp_width": 0.0608, "poses": [[0.14800000000000002, 0.484, 0.153], [0.14800000000000002, 0.484, 0.053], [0.14800000000000002, 0.484, 0.153], [0.38550655364990233, 0.38032493591308597, 0.1534999990463257], [0.38550655364990233, 0.38032493591308597, 0.053499999046325686], [0.38550655364990233, 0.38032493591308597, 0.1534999990463257]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
