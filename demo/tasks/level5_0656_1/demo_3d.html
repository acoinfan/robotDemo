  <style>

<body>
  <div id="info">

    const data = {"task": "level5_0656_1", "boundary": [0.0, 98.3, 0.0, 67.8], "objects": [{"uid": "af998661f9d5407d90e60ba6df492463", "name": "10_book_0_af998661f9d5407d90e60ba6df492463", "instance": "10_book_0", "position": [23.2, 58.1, 11.2], "size": [16.0, 5.4, 22.6], "rotation": [0.4953092336654663, 0.49595925211906433, 0.5039979815483093, 0.5046576857566833], "z_rotation": 1.5707751512527466, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "11_pen_3_0e8155b9bf94494f9754901c53764942", "instance": "11_pen_3", "position": [9.4, 45.4, 1.0], "size": [5.2, 13.9, 1.7], "rotation": [-0.17146573960781097, 0.9813852906227112, 0.043057363480329514, 0.07502338290214539], "z_rotation": 0.3410819470882416, "moved": false, "glb": null}, {"uid": "af998661f9d5407d90e60ba6df492463", "name": "12_book_1_af998661f9d5407d90e60ba6df492463", "instance": "12_book_1", "position": [24.8, 18.6, 3.2], "size": [20.8, 29.2, 6.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "1e305b5d90244f8ab23721d98150f425", "name": "13_pen_4_1e305b5d90244f8ab23721d98150f425", "instance": "13_pen_4", "position": [12.0, 45.4, 0.7], "size": [1.4, 15.0, 1.6], "rotation": [0.0, -0.6222972273826599, 0.0, 0.7827810645103455], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "8d4857932fba4a65a286ec60751c5201", "name": "14_pen_5_8d4857932fba4a65a286ec60751c5201", "instance": "14_pen_5", "position": [10.3, 45.2, 1.7], "size": [1.1, 11.5, 1.1], "rotation": [0.0, 0.0, 0.018216805532574654, 0.9998340606689453], "z_rotation": 0.036435626447200775, "moved": false, "glb": null}, {"uid": "0be004df7a6243aa8f21b95e8675b9c1", "name": "15_pen_6_0be004df7a6243aa8f21b95e8675b9c1", "instance": "15_pen_6", "position": [11.4, 45.8, 2.0], "size": [1.1, 12.2, 1.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "16_pen_7_0e8155b9bf94494f9754901c53764942", "ins ll}, {"uid": "76703d06-7adf-442e-be95-7dde6ce265e6", "name": "4_calculator_0_76703d06-7adf-442e-be95-7dde6ce265e6", "instance": "4_calculator_0", "position": [33.7, 39.1, 1.2], "size": [6.8, 8.5, 2.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "1e305b5d90244f8ab23721d98150f425", "name": "5_pen_0_1e305b5d90244f8ab23721d98150f425", "instance": "5_pen_0", "position": [8.0, 44.3, 0.6], "size": [1.3, 13.2, 1.3], "rotation": [0.0, 0.0, -0.0016873315908014774, 0.9999985694885254], "z_rotation": -0.0033746648114174604, "moved": false, "glb": null}, {"uid": "0be004df7a6243aa8f21b95e8675b9c1", "name": "6_pen_1_0be004df7a6243aa8f21b95e8675b9c1", "instance": "6_pen_1", "position": [10.7, 45.7, 0.6], "size": [1.1, 12.0, 1.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "8_pen_2_0e8155b9bf94494f9754901c53764942", "instance": "8_pen_2", "position": [8.4, 44.4, 2.2], "size": [5.0, 13.4, 1.7], "rotation": [-0.17511162161827087, 0.9829540848731995, 0.046621665358543396, 0.031042125076055527], "z_rotation": 0.3494539260864258, "moved": false, "glb": null}, {"uid": "81a3a49fd57a48ccb005e2c925973a14", "name": "9_book_notebook_1_81a3a49fd57a48ccb005e2c925973a14", "instance": "9_book_notebook_1", "position": [22.8, 19.3, 11.6], "size": [15.1, 21.5, 1.8], "rotation": [-0.2026902288198471, -0.006994185969233513, 0.014151478186249733, 0.9791156649589539], "z_rotation": 0.03055289387702942, "moved": true, "glb": null}], "target": {"uid": "81a3a49fd57a48ccb005e2c925973a14", "name": "9_book_notebook_1_81a3a49fd57a48ccb005e2c925973a14", "instance": "9_book_notebook_1", "position": [87.73756408691406, 3.6807849407196045, 40.25255584716797], "size": [15.1, 21.5, 1.8], "rotation": [-0.6913422762584216, 0.5901483212695187, -0.41458966030582733, 0.0], "z_rotation": 0.03055289387702942, "moved": true, "glb": null}, "plan": {"object_uid": "81a3a49fd57a48ccb005e2c925973a14", "object_instance": "9_book_notebook_1", "position_delta": 72.67610381126111, "rotation_delta": 2.880337162533029, "grasp_width": 0.08, "poses": [[0.228, 0.193, 0.216], [0.228, 0.193, 0.11599999999999999], [0.228, 0.193, 0.216], [0.8773756408691407, 0.036807849407196044, 0.5025255584716797], [0.8773756408691407, 0.036807849407196044, 0.4025255584716797], [0.8773756408691407, 0.036807849407196044, 0.5025255584716797]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
