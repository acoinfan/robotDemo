<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1492_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1492_1", "boundary": [0.0, 106.9, 0.0, 71.9], "objects": [{"uid": "f6980f8fc24547348d15627d2af99c0c", "name": "10_pencil_0_f6980f8fc24547348d15627d2af99c0c", "instance": "10_pencil_0", "position": [16.9, 54.8, 0.4], "size": [13.4, 0.7, 0.7], "rotation": [0.0, 0.0, -0.711002767086029, 0.7031893134117126], "z_rotation": -1.5818463563919067, "moved": false, "glb": null}, {"uid": "4842e147554b4a06ad061cc2ab89ccda", "name": "12_pencil_1_4842e147554b4a06ad061cc2ab89ccda", "instance": "12_pencil_1", "position": [19.9, 55.3, 0.4], "size": [14.6, 0.7, 0.7], "rotation": [0.0, 0.0, -0.7130343317985535, 0.701129138469696], "z_rotation": -1.5876330137252808, "moved": false, "glb": null}, {"uid": "a64e9ce9bccb4b5ab52d6bf0f186bd97", "name": "15_pencil_2_a64e9ce9bccb4b5ab52d6bf0f186bd97", "instance": "15_pencil_2", "position": [14.0, 54.1, 0.2], "size": [0.5, 14.0, 0.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "4842e147554b4a06ad061cc2ab89ccda", "name": "17_pencil_3_4842e147554b4a06ad061cc2ab89ccda", "instance": "17_pencil_3", "position": [23.6, 53.9, 0.5], "size": [14.5, 0.7, 0.7], "rotation": [0.6793510913848877, -0.6756563186645508, -0.20189546048641205, 0.20299966633319855], "z_rotation": -1.5653427839279175, "moved": false, "glb": null}, {"uid": "edc8c38a80f5419092f72e8febf3598b", "name": "1_clock_0_edc8c38a80f5419092f72e8febf3598b", "instance": "1_clock_0", "position": [59.6, 44.2, 0.5], "size": [6.4, 6.5, 1.3], "rotation": [-0.6992963552474976, 0.0, 0.0, 0.7148318886756897], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "48fd553e592e4289bec9a1df3c4a01cc", "name": "21_pencil_4_48fd553e592e4289bec9a1df3c4a01cc", "instance": "21_pencil_4", "position": [9.1, 53.4, 0.6], "size": [1.2, 14.2, 1.2], "rotation": [-0.7056620121002197, 0.0, 0.0, 0.7085486054420471], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "48fd553e592e4289bec9a1df3c4a01cc", "name": "22_pencil_5_48fd553e592e4289bec9a1df3c4a01cc", "instance": "22_pencil_5", "position": [11.9, 54.5, 0.6], "size": [1.2, 14.4, 1.2], "rotation": [-0.7040918469429016, 0.0, 0.0, 0.7101089358329773], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "275967704e5348689ab6b42fde76c775", "name": "2_cup_0_275967704e5348689ab6b42fde76c775", "instance": "2_cup_0", "position": [16.4, 37.9, 3.6], "size": [14.0, 13.6, 7.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "ac265d6dd72f483e9377a1da57c3038a", "name": "3_plant_0_ac265d6dd72f483e9377a1da57c3038a", "instance": "3_plant_0", "position": [69.1, 43.9, 8.3], "size": [9.8, 9.8, 16.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "4eb66e5c0b4f4e60b8e3e2e8e2c8b84c", "name": "6_wallet_0_4eb66e5c0b4f4e60b8e3e2e8e2c8b84c", "instance": "6_wallet_0", "position": [65.5, 17.5, 2.5], "size": [12.6, 20.6, 5.0], "rotation": [0.0, 0.0, 0.35633739829063416, 0.9343573451042175], "z_rotation": 0.7286900877952576, "moved": false, "glb": null}, {"uid": "gen_312b8e2c-a764-4c74-b2ec-a6b7f97bb967", "name": "8_clipboard_notebook_0_gen_312b8e2c-a764-4c74-b2ec-a6b7f97bb967", "instance": "8_clipboard_notebook_0", "position": [40.0, 55.6, 0.2], "size": [21.7, 30.6, 0.7], "rotation": [-0.7080398797988892, 0.0, 0.0, 0.7061724662780762], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "9_clip_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "9_clip_notebook_0", "position": [38.8, 26.0, 2.9], "size": [20.9, 23.9, 5.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "edc8c38a80f5419092f72e8febf3598b", "name": "1_clock_0_edc8c38a80f5419092f72e8febf3598b", "instance": "1_clock_0", "position": [33.60921859741211, 49.09856033325195, 0.6495910286903381], "size": [6.4, 6.5, 1.3], "rotation": [-0.2936100278506987, 0.9558163293733642, 0.0, 0.0], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "edc8c38a80f5419092f72e8febf3598b", "object_instance": "1_clock_0", "position_delta": 26.448799381663484, "rotation_delta": 2.72796676547561, "grasp_width": 0.0512, "poses": [[0.596, 0.44200000000000006, 0.10500000000000001], [0.596, 0.44200000000000006, 0.005], [0.596, 0.44200000000000006, 0.10500000000000001], [0.3360921859741211, 0.49098560333251956, 0.10649591028690339], [0.3360921859741211, 0.49098560333251956, 0.006495910286903382], [0.3360921859741211, 0.49098560333251956, 0.10649591028690339]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
