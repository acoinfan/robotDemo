<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1538_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1538_1", "boundary": [0.0, 157.0, 0.0, 87.4], "objects": [{"uid": "7bfa596d1cfe44d298243636a0b611fc", "name": "11_notebook_1_7bfa596d1cfe44d298243636a0b611fc", "instance": "11_notebook_1", "position": [25.4, 35.5, 1.1], "size": [24.5, 31.4, 2.1], "rotation": [0.02650044485926628, -0.003246328793466091, 0.12154864519834518, 0.9922263622283936], "z_rotation": 0.243453249335289, "moved": false, "glb": null}, {"uid": "343b868fd50646118b07b499e994622c", "name": "12_keyrings_0_343b868fd50646118b07b499e994622c", "instance": "12_keyrings_0", "position": [30.4, 27.4, 2.6], "size": [5.1, 10.9, 1.3], "rotation": [-0.5742632746696472, 0.41346123814582825, -0.4128592312335968, 0.5734272003173828], "z_rotation": -1.248026967048645, "moved": true, "glb": null}, {"uid": "c63ee81b71ff45b68a778101b4df3d46", "name": "1_keyboard_0_c63ee81b71ff45b68a778101b4df3d46", "instance": "1_keyboard_0", "position": [81.6, 27.8, 1.6], "size": [54.4, 16.2, 3.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "fe530220-cc28-4bc9-a9e6-e04655f2ce9a", "name": "2_alarm_clock_0_fe530220-cc28-4bc9-a9e6-e04655f2ce9a", "instance": "2_alarm_clock_0", "position": [139.7, 68.6, 7.0], "size": [26.9, 6.9, 13.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "81dc088e5036400c80862f6815c8a3c8", "name": "3_coffee_cup_0_81dc088e5036400c80862f6815c8a3c8", "instance": "3_coffee_cup_0", "position": [115.7, 55.2, 7.2], "size": [11.8, 11.8, 14.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "3923dbced4e64a479efcad63ba8e3e03", "name": "4_phone_0_3923dbced4e64a479efcad63ba8e3e03", "instance": "4_phone_0", "position": [136.5, 32.3, 0.3], "size": [7.4, 15.0, 0.6], "rotation": [0.0, 0.0, 0.3260609209537506, 0.9453487396240234], "z_rotation": 0.6642675399780273, "moved": false, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "5_mouse_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "5_mouse_0", "position": [118.9, 24.8, 1.1], "size": [6.2, 12.0, 2.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "663d66bb8cf94964959a7b8323193bf9", "name": "6_phone_1_663d66bb8cf94964959a7b8323193bf9", "instance": "6_phone_1", "position": [84.5, 48.5, 0.5], "size": [7.0, 14.1, 1.0], "rotation": [0.0, 0.0, -0.6981818675994873, 0.7159204483032227], "z_rotation": -1.545709490776062, "moved": false, "glb": null}, {"uid": "72d2210fac0c4a96889d08455e2a5cc9", "name": "7_plant_0_72d2210fac0c4a96889d08455e2a5cc9", "instance": "7_plant_0", "position": [30.1, 76.2, 18.7], "size": [27.2, 21.6, 37.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "04eeeca688074aa19a9c94e596b04e33", "name": "8_plant_1_04eeeca688074aa19a9c94e596b04e33", "instance": "8_plant_1", "position": [11.0, 66.7, 10.4], "size": [17.1, 17.3, 20.8], "rotation": [0.0, 0.0, -0.18274420499801636, 0.9831604957580566], "z_rotation": -0.36755385994911194, "moved": false, "glb": null}, {"uid": "bae37c9a52d54e7ba4d60a0276b3ae88", "name": "9_computer_0_bae37c9a52d54e7ba4d60a0276b3ae88", "instance": "9_computer_0", "position": [77.9, 70.1, 35.7], "size": [73.0, 15.0, 71.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "343b868fd50646118b07b499e994622c", "name": "12_keyrings_0_343b868fd50646118b07b499e994622c", "instance": "12_keyrings_0", "position": [126.53227233886719, 58.522708892822266, 0.5916358232498169], "size": [5.1, 10.9, 1.3], "rotation": [0.0, 0.0, -0.33590646802379026, 0.941552433396861], "z_rotation": -1.248026967048645, "moved": true, "glb": null}, "plan": {"object_uid": "343b868fd50646118b07b499e994622c", "object_instance": "12_keyrings_0", "position_delta": 101.06468384419921, "rotation_delta": 1.6493024793501334, "grasp_width": 0.0408, "poses": [[0.304, 0.27399999999999997, 0.126], [0.304, 0.27399999999999997, 0.026000000000000002], [0.304, 0.27399999999999997, 0.126], [1.265322723388672, 0.5852270889282226, 0.10591635823249818], [1.265322723388672, 0.5852270889282226, 0.005916358232498169], [1.265322723388672, 0.5852270889282226, 0.10591635823249818]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
