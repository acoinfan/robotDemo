  <style>

<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>

  <script type="importmap">

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0475_0", "boundary": [0.0, 86.5, 0.0, 54.6], "objects": [{"uid": "228e76e6ff2b4fcbbfae36b37c5232b6", "name": "10_business_card_0_228e76e6ff2b4fcbbfae36b37c5232b6", "instance": "10_business_card_0", "position": [36.2, 5.0, 0.2], "size": [4.6, 7.9, 0.2], "rotation": [0.0, 0.0, 0.7594330310821533, 0.6505854725837708], "z_rotation": 1.7248823642730713, "moved": false, "glb": null}, {"uid": "gen_335ab012-6c35-413c-882b-425a7975d7a6", "name": "14_pencil_holder_0_gen_335ab012-6c35-413c-882b-425a7975d7a6", "instance": "14_pencil_holder_0", "position": [17.7, 50.0, 6.8], "size": [7.1, 7.2, 13.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "15_pencil_holder_1_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "15_pencil_holder_1", "position": [8.7, 43.1, 12.9], "size": [11.0, 15.8, 25.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "51055f66-fd44-4966-85bc-d55cbd06276c", "name": "16_pen_4_51055f66-fd44-4966-85bc-d55cbd06276c", "instance": "16_pen_4", "position": [53.5, 22.8, 0.1], "size": [1.5, 6.4, 0.1], "rotation": [0.0, 0.0, 0.17264340817928314, 0.9849843978881836], "z_rotation": 0.3470255136489868, "moved": false, "glb": null}, {"uid": "gen_447147e3-7b11-4614-80fe-a5ecff0b1231", "name": "17_sticky_note_1_gen_447147e3-7b11-4614-80fe-a5ecff0b1231", "instance": "17_sticky_note_1", "position": [43.3, 46.9, 0.2], "size": [8.3, 8.3, 0.4], "rotation": [0.0, 0.0, -0.024290110915899277, 0.9997049570083618], "z_rotation": -0.04858499765396118, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "19_notebook_1_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "19_notebook_1", "position": [73.8, 13.9, 0.6], "size": [14.3, 19.3, 1.2], "rotation": [0.0, 0.0, -0.9351828098297119, 0.35416537523269653], "z_rotation": -2.4175498485565186, "moved": false, "glb": null}, {"uid": "20067975d06343489bd455c6c5821f33", "name": "1_coffee_mug_0_20067975d06343489bd455c6c5821f33", "instance": "1_coffee_mug_0", "position": [56.3, 36.1, 3.5], "size": [13.8, 14.2, 6.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0a1fdb4f90944c1ab53290a84a275f1b", "name": "26_notebook_2_0a1fdb4f90944c1ab53290a84a275f1b", "instance": "26_notebook_2", "position": [13.0, 11.7, 0.9], "size": [10.5, 15.7, 1.7], "rotation": [-0.7017136216163635, 0.12076511234045029, -0.13548901677131653, 0.6889532208442688], "z_rotation": -0.3642800748348236, "moved": true, "glb": null}, {"uid": "e0058d59ac714df898d10ff56198a117", "name": "3_lamp_0_e0058d59ac714df898d10ff56198a117", "instance": "3_lamp_0", "position": [75.6, 37.8, 14.8], "size": [11.3, 20.2, 29.6], "rotation": [0.0, 0.0, -0.4886511564254761, 0.872479259967804], "z_rotation": -1.0210862159729004, "moved": false, "glb": null}, {"uid": "b0fdda96fcb94002b8be3077f5b95299", "name": "4_scissors_0_b0fdda96fcb94002b8be3077f5b95299", "instance": "4_scissors_0", "position": [10.9, 27.8, 0.2], "size": [8.1, 10.5, 0.6], "rotation": [0.7020124793052673, -0.11870306730270386, -0.11707331985235214, 0.6923741102218628], "z_rotation": -0.3350105583667755, "moved": false, "glb": null}, {"uid": "04eeeca688074aa19a9c94e596b04e33", "name": "5_plant_0_04eeeca688074aa19a9c94e596b04e33", "instance": "5_plant_0", "position": [76.6, 49.0, 6.4], "size": [10.4, 10.6, 12.7], "rotation": [0.0, 0.0, -0.26710107922554016, 0.9636685252189636], "z_rotation": -0.5407671332359314, "moved": false, "glb": null}, {"uid": "2231de62f3694a39a75950c163683e52", "name": "6_scissors_1_2231de62f3694a39a75950c163683e52", "instance": "6_scissors_1", "position": [16.7, 27.9, 0.2], "size": [10.6, 4.7, 0.3], "rotation": [0.0, 0.0, -0.7536229491233826, 0.6573070287704468], "z_rotation": -1.7071131467819214, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "7_sticky_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "7_sticky_note_0", "position": [53.2, 13.3, 0.8], "size": [10.0, 10.1, 1.3], "rotation": [0.062168002128601074, -0.06230803206562996, 0.7051543593406677, 0.7035696506500244], "z_rotation": 1.573081612586975, "moved": false, "glb": null}, {"uid": "921ea963c74c4d71880d49a37eac19bc", "name": "8_notebook_0_921ea963c74c4d71880d49a37eac19bc", "instance": "8_notebook_0", "position": [33.5, 23.9, 3.5], "size": [17.7, 23.4, 6.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "0a1fdb4f90944c1ab53290a84a275f1b", "name": "26_notebook_2_0a1fdb4f90944c1ab53290a84a275f1b", "instance": "26_notebook_2", "position": [134.46731567382812, 230.2361297607422, 0.949999988079071], "size": [10.5, 15.7, 1.7], "rotation": [-0.29703469077214717, 0.4602493372722282, 0.7500687827961284, 0.3705910968886108], "z_rotation": -0.3642800748348236, "moved": true, "glb": null}, "plan": {"object_uid": "0a1fdb4f90944c1ab53290a84a275f1b", "object_instance": "26_notebook_2", "position_delta": 250.02470135530245, "rotation_delta": 2.279747550870313, "grasp_width": 0.08, "poses": [[0.13, 0.11699999999999999, 0.10900000000000001], [0.13, 0.11699999999999999, 0.009000000000000001], [0.13, 0.11699999999999999, 0.10900000000000001], [1.3446731567382812, 2.302361297607422, 0.10949999988079072], [1.3446731567382812, 2.302361297607422, 0.009499999880790711], [1.3446731567382812, 2.302361297607422, 0.10949999988079072]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
