<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1180_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1180_1", "boundary": [0.0, 117.0, 0.0, 68.8], "objects": [{"uid": "0e8155b9bf94494f9754901c53764942", "name": "11_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "11_pen_1", "position": [37.1, 12.6, 0.6], "size": [2.9, 7.7, 1.0], "rotation": [-0.05974099785089493, -0.009906587190926075, -0.1632915586233139, 0.984717607498169], "z_rotation": -0.32641851902008057, "moved": false, "glb": null}, {"uid": "f98c3e7ff9da48989d743e718c69f335", "name": "12_monitor_1_f98c3e7ff9da48989d743e718c69f335", "instance": "12_monitor_1", "position": [63.4, 47.0, 26.3], "size": [75.1, 22.3, 52.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "212f2713f3704907a2ca16c1546cb8f7", "name": "13_mouse_0_212f2713f3704907a2ca16c1546cb8f7", "instance": "13_mouse_0", "position": [106.0, 44.5, 1.6], "size": [5.0, 7.7, 3.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "212f2713f3704907a2ca16c1546cb8f7", "name": "15_mouse_1_212f2713f3704907a2ca16c1546cb8f7", "instance": "15_mouse_1", "position": [97.6, 16.3, 1.8], "size": [5.5, 8.3, 3.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e3467ea791e24a86a1349d25cf98a1c8", "name": "1_keyboard_0_e3467ea791e24a86a1349d25cf98a1c8", "instance": "1_keyboard_0", "position": [63.2, 16.2, 1.0], "size": [29.6, 12.0, 1.7], "rotation": [-9.263374522561207e-05, -0.0141456862911582, -0.9998785257339478, 0.006547762081027031], "z_rotation": -3.1285009384155273, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "2_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "2_pen_0", "position": [29.0, 12.6, 1.9], "size": [3.4, 8.9, 1.1], "rotation": [-0.06194738298654556, -0.011683098040521145, -0.18496139347553253, 0.9807218313217163], "z_rotation": -0.3701164424419403, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "3_sticky_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "3_sticky_note_0", "position": [89.3, 30.8, 0.8], "size": [11.5, 11.6, 1.4], "rotation": [0.06836950778961182, -0.066365547478199, 0.6933437585830688, 0.71427983045578], "z_rotation": 1.5405020713806152, "moved": false, "glb": null}, {"uid": "219e9ed4b6724336ba62a62be6263367", "name": "4_cup_0_219e9ed4b6724336ba62a62be6263367", "instance": "4_cup_0", "position": [107.2, 32.8, 6.1], "size": [13.8, 11.2, 12.1], "rotation": [0.0, 0.0, -0.9996598362922668, 0.026080738753080368], "z_rotation": -3.0894253253936768, "moved": false, "glb": null}, {"uid": "0949edc313e14f7c8984249291ead708", "name": "5_game_controller_0_0949edc313e14f7c8984249291ead708", "instance": "5_game_controller_0", "position": [27.5, 32.5, 3.7], "size": [16.6, 10.4, 7.0], "rotation": [0.0, 0.0, -0.9999412894248962, 0.010837209410965443], "z_rotation": -3.119917869567871, "moved": false, "glb": null}, {"uid": "04eeeca688074aa19a9c94e596b04e33", "name": "6_plant_0_04eeeca688074aa19a9c94e596b04e33", "instance": "6_plant_0", "position": [14.0, 56.0, 15.5], "size": [25.3, 25.7, 30.8], "rotation": [0.0, 0.0, -0.25666555762290955, 0.9665002822875977], "z_rotation": -0.5191411972045898, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "8_notebook_0_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "8_notebook_0", "position": [28.1, 12.6, 0.8], "size": [14.9, 20.2, 1.3], "rotation": [0.0, 0.0, 0.9999907612800598, 0.00429008062928915], "z_rotation": 3.133012533187866, "moved": false, "glb": null}, {"uid": "37ca4170b56a4f38846bdcba4a75fcf3", "name": "9_bowl_0_37ca4170b56a4f38846bdcba4a75fcf3", "instance": "9_bowl_0", "position": [104.9, 53.8, 2.3], "size": [6.5, 6.4, 4.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}], "target": {"uid": "37ca4170b56a4f38846bdcba4a75fcf3", "name": "9_bowl_0_37ca4170b56a4f38846bdcba4a75fcf3", "instance": "9_bowl_0", "position": [29.11290168762207, 10.994144439697266, 3.899343729019165], "size": [6.5, 6.4, 4.7], "rotation": [-0.20129210051859237, -0.5515872050137315, 0.3260894534565625, 0.7408769897077063], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "37ca4170b56a4f38846bdcba4a75fcf3", "object_instance": "9_bowl_0", "position_delta": 87.0550598255098, "rotation_delta": 1.4728423296397728, "grasp_width": 0.0512, "poses": [[1.0490000000000002, 0.538, 0.123], [1.0490000000000002, 0.538, 0.023], [1.0490000000000002, 0.538, 0.123], [0.2911290168762207, 0.10994144439697266, 0.13899343729019165], [0.2911290168762207, 0.10994144439697266, 0.038993437290191654], [0.2911290168762207, 0.10994144439697266, 0.13899343729019165]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
