<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1408_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1408_1", "boundary": [0.0, 64.5, 0.0, 55.0], "objects": [{"uid": "0e8155b9bf94494f9754901c53764942", "name": "11_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "11_pen_1", "position": [19.5, 13.5, 0.7], "size": [11.5, 7.9, 1.2], "rotation": [0.7643270492553711, 0.13097229599952698, 0.6195401549339294, 0.12173932790756226], "z_rotation": 1.0571885108947754, "moved": false, "glb": null}, {"uid": "485e8ea7bd4947428521570a747fd459", "name": "12_agenda_notebook_0_485e8ea7bd4947428521570a747fd459", "instance": "12_agenda_notebook_0", "position": [51.9, 12.3, 1.2], "size": [15.1, 17.3, 2.4], "rotation": [0.0, 0.0, 0.11518381536006927, 0.9933441877365112], "z_rotation": 0.23088008165359497, "moved": false, "glb": null}, {"uid": "cee4802cafe3483c9d72f27d6f3e06d1", "name": "15_notepad_1_cee4802cafe3483c9d72f27d6f3e06d1", "instance": "15_notepad_1", "position": [51.1, 9.4, 2.7], "size": [4.8, 6.4, 1.7], "rotation": [0.0, 0.0, 0.12399810552597046, 0.9922824501991272], "z_rotation": 0.2486361414194107, "moved": false, "glb": null}, {"uid": "a98eb89f0f2343fe96a1c8c8f78c1c0c", "name": "16_agenda_0_a98eb89f0f2343fe96a1c8c8f78c1c0c", "instance": "16_agenda_0", "position": [10.5, 32.5, 0.7], "size": [5.6, 7.7, 1.3], "rotation": [0.0, 0.0, 0.5383385419845581, 0.8427286744117737], "z_rotation": 1.136928677558899, "moved": true, "glb": null}, {"uid": "5899d997-4d52-4918-97b5-32195cbe58fb", "name": "18_agenda_2_5899d997-4d52-4918-97b5-32195cbe58fb", "instance": "18_agenda_2", "position": [10.1, 17.2, 0.9], "size": [13.5, 17.1, 1.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "275967704e5348689ab6b42fde76c775", "name": "1_cup_0_275967704e5348689ab6b42fde76c775", "instance": "1_cup_0", "position": [51.3, 42.4, 2.4], "size": [10.3, 9.9, 5.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "b383d0141c21446e8f716d7ada8cb9a9", "name": "3_tablet_sketchbook_0_b383d0141c21446e8f716d7ada8cb9a9", "instance": "3_tablet_sketchbook_0", "position": [32.2, 40.8, 1.4], "size": [24.5, 17.4, 2.8], "rotation": [0.0008029505261220038, -0.9996764659881592, 0.025406010448932648, 0.000956306466832757], "z_rotation": 0.0015567929949611425, "moved": false, "glb": null}, {"uid": "gen_335ab012-6c35-413c-882b-425a7975d7a6", "name": "4_pencil_holder_desk_0_gen_335ab012-6c35-413c-882b-425a7975d7a6", "instance": "4_pencil_holder_desk_0", "position": [13.7, 42.2, 8.6], "size": [9.1, 9.2, 17.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "5_spiral_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "5_spiral_notebook_0", "position": [31.4, 13.7, 1.3], "size": [18.6, 21.5, 2.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "7_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "7_pen_0", "position": [31.8, 27.1, 0.8], "size": [5.4, 12.7, 1.5], "rotation": [-0.7918262481689453, 0.5655467510223389, 0.16316531598567963, 0.1629268079996109], "z_rotation": 1.9203201532363892, "moved": false, "glb": null}, {"uid": "gen_51a24704-d1c2-4310-af0d-19cb9ab0f65b", "name": "8_desk_organizer_0_gen_51a24704-d1c2-4310-af0d-19cb9ab0f65b", "instance": "8_desk_organizer_0", "position": [54.1, 30.7, 3.0], "size": [16.0, 10.6, 6.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "a98eb89f0f2343fe96a1c8c8f78c1c0c", "name": "16_agenda_0_a98eb89f0f2343fe96a1c8c8f78c1c0c", "instance": "16_agenda_0", "position": [23.7325382232666, 43.51508331298828, 0.75], "size": [5.6, 7.7, 1.3], "rotation": [-0.4334840955881202, -0.5511677531783301, 0.5842086289356708, 0.40866358365482536], "z_rotation": 1.136928677558899, "moved": true, "glb": null}, "plan": {"object_uid": "a98eb89f0f2343fe96a1c8c8f78c1c0c", "object_instance": "16_agenda_0", "position_delta": 17.217277026936767, "rotation_delta": 1.702896159960835, "grasp_width": 0.0448, "poses": [[0.105, 0.325, 0.10700000000000001], [0.105, 0.325, 0.006999999999999999], [0.105, 0.325, 0.10700000000000001], [0.23732538223266603, 0.43515083312988284, 0.10750000000000001], [0.23732538223266603, 0.43515083312988284, 0.0075], [0.23732538223266603, 0.43515083312988284, 0.10750000000000001]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
