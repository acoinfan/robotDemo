<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1328_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1328_1", "boundary": [0.0, 79.0, 0.0, 64.1], "objects": [{"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "10_sticky_note_3_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "10_sticky_note_3", "position": [62.8, 18.7, 0.7], "size": [8.3, 8.4, 1.4], "rotation": [-0.01013830304145813, -0.07274412363767624, 0.13766245543956757, 0.9877523183822632], "z_rotation": 0.2798210382461548, "moved": false, "glb": null}, {"uid": "gen_b0eda79a-42a2-4349-bb83-b6af7af38e1b", "name": "11_list_0_gen_b0eda79a-42a2-4349-bb83-b6af7af38e1b", "instance": "11_list_0", "position": [36.4, 22.4, 1.8], "size": [24.2, 33.2, 3.7], "rotation": [0.0012256106128916144, 0.7128493785858154, 0.7013150453567505, 0.0012057791464030743], "z_rotation": -0.0034386205952614546, "moved": false, "glb": null}, {"uid": "be0a8f15f9624d11bd424ced2a60d714", "name": "1_printer_0_be0a8f15f9624d11bd424ced2a60d714", "instance": "1_printer_0", "position": [61.3, 48.4, 7.2], "size": [28.6, 23.2, 14.4], "rotation": [0.0, 0.0, -0.052995383739471436, 0.9985947608947754], "z_rotation": -0.10604044049978256, "moved": false, "glb": null}, {"uid": "10854be00e2b421bb4f19f89a3a2b4b8", "name": "2_eyeglasses_0_10854be00e2b421bb4f19f89a3a2b4b8", "instance": "2_eyeglasses_0", "position": [39.2, 47.4, 2.3], "size": [11.2, 13.4, 4.6], "rotation": [0.0, 0.0, 0.0418461374938488, 0.9991241097450256], "z_rotation": 0.08371672034263611, "moved": false, "glb": null}, {"uid": "e1a072af323f4d358bad054195353b96", "name": "3_telephone_0_e1a072af323f4d358bad054195353b96", "instance": "3_telephone_0", "position": [13.3, 42.8, 17.2], "size": [5.2, 6.8, 34.3], "rotation": [0.0, 0.0, 0.21740974485874176, 0.9760804176330566], "z_rotation": 0.4383198618888855, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "4_sticky_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "4_sticky_note_0", "position": [12.7, 31.1, 0.7], "size": [7.3, 7.4, 1.3], "rotation": [-0.014167815446853638, -0.06948976218700409, 0.19927042722702026, 0.9773749113082886], "z_rotation": 0.4059082567691803, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "5_sticky_note_1_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "5_sticky_note_1", "position": [10.1, 17.8, 0.8], "size": [9.8, 10.0, 1.6], "rotation": [-0.006968722678720951, -0.07067491859197617, 0.09787871688604355, 0.99266117811203], "z_rotation": 0.19852031767368317, "moved": false, "glb": null}, {"uid": "bd4a2ed3959e469eb0a170eb2c42f39e", "name": "6_briefcase_0_bd4a2ed3959e469eb0a170eb2c42f39e", "instance": "6_briefcase_0", "position": [22.0, 55.1, 9.1], "size": [32.9, 7.2, 18.1], "rotation": [-0.03852885961532593, 0.010847868397831917, 0.1659201830625534, 0.9853265285491943], "z_rotation": 0.33241385221481323, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "7_sticky_note_2_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "7_sticky_note_2", "position": [55.4, 26.4, 0.6], "size": [6.2, 6.2, 1.0], "rotation": [0.011762812733650208, -0.07519437372684479, -0.1541042923927307, 0.9851189255714417], "z_rotation": -0.3137538433074951, "moved": false, "glb": null}, {"uid": "0adcf1771a3c4b5c922c47dd09d149b0", "name": "9_stapler_1_0adcf1771a3c4b5c922c47dd09d149b0", "instance": "9_stapler_1", "position": [62.2, 30.1, 2.8], "size": [3.0, 12.8, 5.4], "rotation": [0.0, 0.0, 0.3674124479293823, 0.9300581216812134], "z_rotation": 0.752450704574585, "moved": true, "glb": null}], "target": {"uid": "0adcf1771a3c4b5c922c47dd09d149b0", "name": "9_stapler_1_0adcf1771a3c4b5c922c47dd09d149b0", "instance": "9_stapler_1", "position": [29.121776580810547, 46.855010986328125, 2.8000001907348633], "size": [3.0, 12.8, 5.4], "rotation": [-0.061893313562679415, -0.7237666645478235, 0.0637091681543451, -0.6843041538078164], "z_rotation": 0.752450704574585, "moved": true, "glb": null}, "plan": {"object_uid": "0adcf1771a3c4b5c922c47dd09d149b0", "object_instance": "9_stapler_1", "position_delta": 37.07963400199347, "rotation_delta": 1.8217996410829504, "grasp_width": 0.024, "poses": [[0.622, 0.30100000000000005, 0.128], [0.622, 0.30100000000000005, 0.027999999999999997], [0.622, 0.30100000000000005, 0.128], [0.2912177658081055, 0.46855010986328127, 0.12800000190734864], [0.2912177658081055, 0.46855010986328127, 0.028000001907348634], [0.2912177658081055, 0.46855010986328127, 0.12800000190734864]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
