<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>

  <script type="importmap">

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0189_0", "boundary": [0.0, 120.1, 0.0, 66.4], "objects": [{"uid": "e8b7da8075684114b8dd611907818c35", "name": "10_monitor_0_e8b7da8075684114b8dd611907818c35", "instance": "10_monitor_0", "position": [58.9, 48.6, 0.7], "size": [49.1, 30.7, 1.1], "rotation": [-0.5604984760284424, 0.0, 0.0, 0.8281554579734802], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "c483b67d-4d32-4a5b-8bd5-1e8a2c2e59ed", "name": "11_plant_1_c483b67d-4d32-4a5b-8bd5-1e8a2c2e59ed", "instance": "11_plant_1", "position": [22.7, 56.9, 8.3], "size": [12.4, 13.9, 16.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "1ffe87b871804859ae741ec97942649d", "name": "12_cup_mug_1_1ffe87b871804859ae741ec97942649d", "instance": "12_cup_mug_1", "position": [25.7, 29.8, 4.1], "size": [9.7, 6.0, 7.7], "rotation": [0.0, 0.0, 0.21873895823955536, 0.9757834076881409], "z_rotation": 0.4410439133644104, "moved": false, "glb": null}, {"uid": "119d5abe285545559f2a8b25760f7354", "name": "13_notebook_0_119d5abe285545559f2a8b25760f7354", "instance": "13_notebook_0", "position": [32.6, 15.5, 1.3], "size": [13.8, 18.7, 2.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "14_sticky_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "14_sticky_note_0", "position": [87.1, 11.6, 0.6], "size": [4.6, 4.6, 0.7], "rotation": [0.049343291670084, -0.04863505810499191, 0.7104886770248413, 0.7002897262573242], "z_rotation": 1.5852546691894531, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "16_sticky_note_1_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "16_sticky_note_1", "position": [87.1, 17.9, 0.6], "size": [4.2, 4.2, 0.6], "rotation": [0.0520913302898407, -0.05220244079828262, 0.7044296264648438, 0.7059321999549866], "z_rotation": 1.5686655044555664, "moved": false, "glb": null}, {"uid": "dd26c43c968d4634b1b9ad990191e2b9", "name": "17_books_0_dd26c43c968d4634b1b9ad990191e2b9", "instance": "17_books_0", "position": [97.0, 50.0, 2.8], "size": [14.5, 18.0, 5.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "215a41d8b6d44ecdbd70cc9680c0f585", "name": "18_clock_1_215a41d8b6d44ecdbd70cc9680c0f585", "instance": "18_clock_1", "position": [42.8, 31.6, 2.9], "size": [4.0, 2.6, 5.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_54937a05-c29d-4227-ab9b-0a516b22fe85", "name": "19_sticky_note_2_gen_54937a05-c29d-4227-ab9b-0a516b22fe85", "instance": "19_sticky_note_2", "position": [90.1, 12.1, 0.0], "size": [6.0, 6.0, 0.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "1_mouse_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "1_mouse_0", "position": [78.8, 11.9, 1.2], "size": [5.0, 9.7, 1.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "e12136221cec4d19b9ca2384ee04a211", "name": "2_laptop_0_e12136221cec4d19b9ca2384ee04a211", "instance": "2_laptop_0", "position": [59.3, 20.6, 9.1], "size": [28.0, 24.8, 17.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "4_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "4_pen_0", "position": [83.5, 15.1, 1.0], "size": [4.0, 10.6, 1.4], "rotation": [-0.07589468359947205, -0.013063738122582436, -0.16913199424743652, 0.9825801253318787], "z_rotation": -0.3371775448322296, "moved": false, "glb": null}, {"uid": "dd26c43c968d4634b1b9ad990191e2b9", "name": "5_stack_0_dd26c43c968d4634b1b9ad990191e2b9", "instance": "5_stack_0", "position": [97.0, 49.4, 7.7], "size": [14.2, 17.5, 4.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "76703d06-7adf-442e-be95-7dde6ce265e6", "name": "7_calculator_0_76703d06-7adf-442e-be95-7dde6ce265e6", "instance": "7_calculator_0", "position": [95.4, 18.8, 1.8], "size": [9.2, 15.1, 3.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e3cae64e7d3048049b4ea3c9dcb88e2f", "name": "8_cup_mug_0_e3cae64e7d3048049b4ea3c9dcb88e2f", "instance": "8_cup_mug_0", "position": [82.0, 28.4, 2.2], "size": [8.6, 7.3, 3.7], "rotation": [0.0, 0.0, 0.9994489550590515, 0.03319396823644638], "z_rotation": 3.075192451477051, "moved": false, "glb": null}], "target": {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "1_mouse_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "1_mouse_0", "position": [84.4385986328125, 6.502394199371338, 0.8546174764633179], "size": [5.0, 9.7, 1.8], "rotation": [-0.06216149837701902, 0.9980626902765668, 0.0, 0.0], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "object_instance": "1_mouse_0", "position_delta": 7.813272810320895, "rotation_delta": 3.141592653589793, "grasp_width": 0.04000000000000001, "poses": [[0.788, 0.11900000000000001, 0.112], [0.788, 0.11900000000000001, 0.012], [0.788, 0.11900000000000001, 0.112], [0.844385986328125, 0.06502394199371338, 0.10854617476463319], [0.844385986328125, 0.06502394199371338, 0.008546174764633178], [0.844385986328125, 0.06502394199371338, 0.10854617476463319]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
