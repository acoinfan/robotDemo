<html lang="en">

  <title>MesaTask 3D Demo - level4_2022_0</title>
  <style>

<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">

  <script type="importmap">
    {

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_2022_0", "boundary": [0.0, 93.8, 0.0, 66.7], "objects": [{"uid": "0e8155b9bf94494f9754901c53764942", "name": "11_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "11_pen_1", "position": [80.9, 56.8, 8.4], "size": [1.2, 1.7, 13.7], "rotation": [0.15241548418998718, -0.7355297207832336, 0.6543651819229126, 0.08701593428850174], "z_rotation": 0.11703766137361526, "moved": false, "glb": null}, {"uid": "3142a95d8eb044d9906ffe040acddbce", "name": "12_organizer_0_3142a95d8eb044d9906ffe040acddbce", "instance": "12_organizer_0", "position": [83.4, 51.4, 5.2], "size": [17.6, 8.4, 10.2], "rotation": [0.0, 0.0, -0.7071068286895752, 0.7071067094802856], "z_rotation": -1.5707963705062866, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "13_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "13_notebook_0", "position": [13.6, 15.1, 1.3], "size": [12.1, 15.8, 2.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "14_notebook_1_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "14_notebook_1", "position": [62.6, 31.3, 1.1], "size": [11.4, 13.1, 2.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "c1643b57199a4d90ae00202fad07123e", "name": "15_cup_1_c1643b57199a4d90ae00202fad07123e", "instance": "15_cup_1", "position": [63.2, 31.6, 4.4], "size": [5.3, 5.3, 5.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "17_pen_2_0e8155b9bf94494f9754901c53764942", "instance": "17_pen_2", "position": [83.4, 57.7, 8.5], "size": [1.2, 1.7, 13.9], "rotation": [0.15241552889347076, -0.7355297207832336, 0.6543651819229126, 0.08701589703559875], "z_rotation": 0.11703777313232422, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "18_pen_3_0e8155b9bf94494f9754901c53764942", "instance": "18_pen_3", "position": [82.1, 56.4, 8.5], "size": [1.3, 1.7, 14.2], "rotation": [0.15241549909114838, -0.7355297207832336, 0.6543651819229126, 0.08701592683792114], "z_rotation": 0.11703769117593765, "moved": false, "glb": null}, {"uid": "a89ffa6be8184f0f96afa26f73ae19d2", "name": "1_mouse_0_a89ffa6be8184f0f96afa26f73ae19d2", "instance": "1_mouse_0", "position": [67.4, 15.8, 0.8], "size": [3.2, 7.2, 1.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "1ffe87b871804859ae741ec97942649d", "name": "2_cup_0_1ffe87b871804859ae741ec97942649d", "instance": "2_cup_0", "position": [23.5, 33.2, 4.2], "size": [10.8, 6.6, 8.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "620c9d52d9e44b4da8aa7931ff0152b2", "name": "3_keyboard_0_620c9d52d9e44b4da8aa7931ff0152b2", "instance": "3_keyboard_0", "position": [43.7, 15.4, 1.2], "size": [27.7, 9.7, 2.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "04eeeca688074aa19a9c94e596b04e33", "name": "4_plant_0_04eeeca688074aa19a9c94e596b04e33", "instance": "4_plant_0", "position": [72.2, 54.4, 12.4], "size": [13.9, 14.2, 24.7], "rotation": [0.0, 0.0, -0.25401654839515686, 0.9671998620033264], "z_rotation": -0.5136615633964539, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "6_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "6_pen_0", "position": [21.5, 15.0, 0.4], "size": [4.3, 11.3, 1.4], "rotation": [0.9784771203994751, 0.16829314827919006, 0.09425022453069687, 0.07332718372344971], "z_rotation": 0.3550415635108948, "moved": false, "glb": null}, {"uid": "e8b7da8075684114b8dd611907818c35", "name": "7_computer_0_e8b7da8075684114b8dd611907818c35", "instance": "7_computer_0", "position": [43.1, 48.1, 13.7], "size": [43.4, 11.6, 27.4], "rotation": [0.0, 0.0, -0.0045524341985583305, 0.9999896287918091], "z_rotation": -0.009104900062084198, "moved": false, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "8_mouse_1_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "8_mouse_1", "position": [53.8, 30.2, 0.5], "size": [3.5, 5.0, 1.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "620c9d52d9e44b4da8aa7931ff0152b2", "name": "9_keyboard_1_620c9d52d9e44b4da8aa7931ff0152b2", "instance": "9_keyboard_1", "position": [40.9, 30.7, 0.7], "size": [18.0, 6.5, 1.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "8_mouse_1_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "8_mouse_1", "position": [29.01127052307129, 24.077655792236328, 0.5119361281394958], "size": [3.5, 5.0, 1.0], "rotation": [0.0, 0.0, -0.06959729090862736, 0.9975751492725653], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "object_instance": "8_mouse_1", "position_delta": 25.533592582123, "rotation_delta": 0.1393072015478203, "grasp_width": 0.028000000000000004, "poses": [[0.538, 0.302, 0.10500000000000001], [0.538, 0.302, 0.005], [0.538, 0.302, 0.10500000000000001], [0.2901127052307129, 0.2407765579223633, 0.10511936128139496], [0.2901127052307129, 0.2407765579223633, 0.005119361281394959], [0.2901127052307129, 0.2407765579223633, 0.10511936128139496]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
