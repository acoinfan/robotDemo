<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_2119_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_2119_1", "boundary": [0.0, 106.8, 0.0, 55.7], "objects": [{"uid": "04eeeca688074aa19a9c94e596b04e33", "name": "10_plant_0_04eeeca688074aa19a9c94e596b04e33", "instance": "10_plant_0", "position": [20.9, 43.6, 4.0], "size": [10.9, 11.0, 8.1], "rotation": [0.0, 0.0, -0.25774621963500977, 0.9662126898765564], "z_rotation": -0.5213778018951416, "moved": false, "glb": null}, {"uid": "06708e597c60482d92161fe3cf770cf6", "name": "15_pen_0_06708e597c60482d92161fe3cf770cf6", "instance": "15_pen_0", "position": [27.5, 8.4, 0.5], "size": [1.0, 9.7, 0.9], "rotation": [0.0, 0.0, 0.37846407294273376, 0.9256159663200378], "z_rotation": 0.776272714138031, "moved": true, "glb": null}, {"uid": "gen_6faa4f7d-c5b2-48dd-a4e1-5f93c9b1902e", "name": "16_notepad_0_gen_6faa4f7d-c5b2-48dd-a4e1-5f93c9b1902e", "instance": "16_notepad_0", "position": [71.0, 30.7, 0.3], "size": [5.9, 5.9, 0.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "18_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "18_pen_1", "position": [32.6, 15.1, 0.8], "size": [4.0, 10.8, 1.5], "rotation": [-0.08244860917329788, -0.004787020850926638, -0.057765036821365356, 0.994908332824707], "z_rotation": -0.11442270129919052, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "19_##pad_1_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "19_##pad_1", "position": [92.3, 22.3, 2.3], "size": [16.3, 18.7, 4.5], "rotation": [0.0, 0.0, -0.06358493119478226, 0.9979764819145203], "z_rotation": -0.12725572288036346, "moved": false, "glb": null}, {"uid": "20067975d06343489bd455c6c5821f33", "name": "1_coffee_mug_0_20067975d06343489bd455c6c5821f33", "instance": "1_coffee_mug_0", "position": [91.7, 8.7, 1.8], "size": [7.5, 7.7, 3.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "22_pen_4_0e8155b9bf94494f9754901c53764942", "instance": "22_pen_4", "position": [29.0, 9.7, 0.6], "size": [3.5, 9.2, 1.2], "rotation": [-0.08609844744205475, 0.01167021319270134, 0.13380879163742065, 0.9871910214424133], "z_rotation": 0.2655695676803589, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "23_pen_5_0e8155b9bf94494f9754901c53764942", "instance": "23_pen_5", "position": [30.9, 12.0, 0.7], "size": [3.7, 9.9, 1.3], "rotation": [-0.0823458731174469, 0.00119638757314533, 0.014477940276265144, 0.9964979290962219], "z_rotation": 0.028661688789725304, "moved": false, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "2_mouse_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "2_mouse_0", "position": [69.5, 8.8, 0.8], "size": [4.5, 8.8, 1.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "bae37c9a52d54e7ba4d60a0276b3ae88", "name": "3_computer_monitor_0_bae37c9a52d54e7ba4d60a0276b3ae88", "instance": "3_computer_monitor_0", "position": [55.5, 41.4, 29.9], "size": [54.8, 12.6, 59.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e3467ea791e24a86a1349d25cf98a1c8", "name": "4_keyboard_0_e3467ea791e24a86a1349d25cf98a1c8", "instance": "4_keyboard_0", "position": [53.8, 18.1, 0.6], "size": [18.2, 7.4, 1.2], "rotation": [0.0, 0.0, -0.9999995231628418, 0.000938725599553436], "z_rotation": -3.1397151947021484, "moved": false, "glb": null}, {"uid": "be0a8f15f9624d11bd424ced2a60d714", "name": "5_printer_0_be0a8f15f9624d11bd424ced2a60d714", "instance": "5_printer_0", "position": [15.5, 22.8, 6.4], "size": [25.5, 20.6, 12.9], "rotation": [0.0, 0.0, 0.4130564332008362, 0.9107054471969604], "z_rotation": 0.8516152501106262, "moved": false, "glb": null}, {"uid": "663d66bb8cf94964959a7b8323193bf9", "name": "6_smartphone_0_663d66bb8cf94964959a7b8323193bf9", "instance": "6_smartphone_0", "position": [78.8, 16.8, 0.3], "size": [4.9, 9.8, 0.6], "rotation": [0.0, 0.0, 0.02104705013334751, 0.9997785091400146], "z_rotation": 0.04209721088409424, "moved": false, "glb": null}, {"uid": "b2c23bbb19de4efbb478f3d515584f68", "name": "9_speaker_1_b2c23bbb19de4efbb478f3d515584f68", "instance": "9_speaker_1", "position": [32.7, 33.8, 3.4], "size": [10.4, 2.9, 6.9], "rotation": [0.0, 0.0, 0.27379482984542847, 0.9617881178855896], "z_rotation": 0.5546728372573853, "moved": false, "glb": null}], "target": {"uid": "06708e597c60482d92161fe3cf770cf6", "name": "15_pen_0_06708e597c60482d92161fe3cf770cf6", "instance": "15_pen_0", "position": [55.375064849853516, 13.64749813079834, 0.4185517728328705], "size": [1.0, 9.7, 0.9], "rotation": [-0.5492492114068317, 0.7432991078396217, 0.2533889827431559, 0.28570222868956546], "z_rotation": 0.776272714138031, "moved": true, "glb": null}, "plan": {"object_uid": "06708e597c60482d92161fe3cf770cf6", "object_instance": "15_pen_0", "position_delta": 28.364804085873388, "rotation_delta": 2.404308272656595, "grasp_width": 0.008, "poses": [[0.275, 0.084, 0.10500000000000001], [0.275, 0.084, 0.005], [0.275, 0.084, 0.10500000000000001], [0.5537506484985352, 0.1364749813079834, 0.10418551772832871], [0.5537506484985352, 0.1364749813079834, 0.004185517728328705], [0.5537506484985352, 0.1364749813079834, 0.10418551772832871]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
