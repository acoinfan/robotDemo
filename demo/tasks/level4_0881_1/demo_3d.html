<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_0881_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0881_1", "boundary": [0.0, 93.6, 0.0, 75.6], "objects": [{"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "10_notebook_1_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "10_notebook_1", "position": [53.6, 30.7, 0.6], "size": [13.6, 18.4, 1.2], "rotation": [0.0, 0.0, 0.9999663233757019, 0.00820710975676775], "z_rotation": 3.125178337097168, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "11_laptop_1_ef18ca96fff24272916d706db1f63d5a", "instance": "11_laptop_1", "position": [16.7, 56.4, 12.2], "size": [31.1, 30.5, 24.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "616aa17c289b4330995eb3a062e52acc", "name": "12_pencil_case_0_616aa17c289b4330995eb3a062e52acc", "instance": "12_pencil_case_0", "position": [34.4, 30.5, 0.7], "size": [18.1, 8.8, 1.4], "rotation": [-0.505405843257904, -0.5036528706550598, 0.4945670962333679, 0.49628835916519165], "z_rotation": 1.567322015762329, "moved": false, "glb": null}, {"uid": "49cdc200eaf640489b99ca818165427a", "name": "13_books_1_49cdc200eaf640489b99ca818165427a", "instance": "13_books_1", "position": [46.2, 47.9, 10.4], "size": [11.2, 13.8, 3.8], "rotation": [0.0, 0.0, 0.7106373906135559, 0.7035585045814514], "z_rotation": 1.5808074474334717, "moved": false, "glb": null}, {"uid": "3891f9d824fb440cbb15d4851bb0fc95", "name": "14_plant_2_3891f9d824fb440cbb15d4851bb0fc95", "instance": "14_plant_2", "position": [16.9, 31.1, 3.1], "size": [18.2, 22.7, 6.2], "rotation": [0.0, 0.0, -0.7079366445541382, 0.706275999546051], "z_rotation": -1.5731449127197266, "moved": true, "glb": null}, {"uid": "dd26c43c968d4634b1b9ad990191e2b9", "name": "1_stack_0_dd26c43c968d4634b1b9ad990191e2b9", "instance": "1_stack_0", "position": [46.1, 48.2, 6.4], "size": [11.8, 14.6, 4.1], "rotation": [0.0, 0.0, 0.712300717830658, 0.7018744349479675], "z_rotation": 1.5855414867401123, "moved": false, "glb": null}, {"uid": "06708e597c60482d92161fe3cf770cf6", "name": "2_pen_0_06708e597c60482d92161fe3cf770cf6", "instance": "2_pen_0", "position": [18.5, 31.0, 7.0], "size": [1.7, 16.3, 1.6], "rotation": [0.0, 0.0, 0.710984468460083, 0.7032077312469482], "z_rotation": 1.5817943811416626, "moved": false, "glb": null}, {"uid": "3a8f8f0c97bd4157a1722eedb4de1d17", "name": "3_plant_0_3a8f8f0c97bd4157a1722eedb4de1d17", "instance": "3_plant_0", "position": [61.8, 49.4, 8.4], "size": [10.1, 12.0, 16.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e12136221cec4d19b9ca2384ee04a211", "name": "4_laptop_0_e12136221cec4d19b9ca2384ee04a211", "instance": "4_laptop_0", "position": [80.5, 50.2, 8.6], "size": [27.0, 24.0, 17.2], "rotation": [0.0, 0.0, -0.708393394947052, 0.7058178782463074], "z_rotation": -1.5744386911392212, "moved": false, "glb": null}, {"uid": "4f5e5ac6-880f-4a3b-943d-54c70a15fd71", "name": "5_sticky_note_0_4f5e5ac6-880f-4a3b-943d-54c70a15fd71", "instance": "5_sticky_note_0", "position": [73.4, 30.2, 0.6], "size": [13.8, 11.2, 1.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "dd26c43c968d4634b1b9ad990191e2b9", "name": "6_books_0_dd26c43c968d4634b1b9ad990191e2b9", "instance": "6_books_0", "position": [45.8, 48.2, 2.2], "size": [12.5, 15.5, 4.3], "rotation": [0.0, 0.0, 0.7143789529800415, 0.6997590661048889], "z_rotation": 1.5914723873138428, "moved": false, "glb": null}, {"uid": "a51ba478-3a52-4f69-a08b-80032e52345f", "name": "7_pen_1_a51ba478-3a52-4f69-a08b-80032e52345f", "instance": "7_pen_1", "position": [62.2, 1.2, 4.3], "size": [0.1, 2.3, 0.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "8_notebook_0_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "8_notebook_0", "position": [39.7, 64.3, 0.5], "size": [12.5, 16.9, 1.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "04eeeca688074aa19a9c94e596b04e33", "name": "9_plant_1_04eeeca688074aa19a9c94e596b04e33", "instance": "9_plant_1", "position": [61.6, 63.6, 8.9], "size": [14.6, 14.9, 17.8], "rotation": [0.0, 0.0, -0.24577400088310242, 0.9693271517753601], "z_rotation": -0.4966363310813904, "moved": false, "glb": null}], "target": {"uid": "3891f9d824fb440cbb15d4851bb0fc95", "name": "14_plant_2_3891f9d824fb440cbb15d4851bb0fc95", "instance": "14_plant_2", "position": [60.05809783935547, 29.398849487304688, 4.237800121307373], "size": [18.2, 22.7, 6.2], "rotation": [0.0, -0.999613422369515, 0.0, 0.0], "z_rotation": -1.5731449127197266, "moved": true, "glb": null}, "plan": {"object_uid": "3891f9d824fb440cbb15d4851bb0fc95", "object_instance": "14_plant_2", "position_delta": 43.20659569202681, "rotation_delta": 3.141592653589793, "grasp_width": 0.08, "poses": [[0.16899999999999998, 0.311, 0.131], [0.16899999999999998, 0.311, 0.031000000000000003], [0.16899999999999998, 0.311, 0.131], [0.6005809783935547, 0.2939884948730469, 0.14237800121307373], [0.6005809783935547, 0.2939884948730469, 0.04237800121307373], [0.6005809783935547, 0.2939884948730469, 0.14237800121307373]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
