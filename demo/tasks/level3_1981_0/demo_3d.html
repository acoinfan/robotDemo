<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1981_0</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1981_0", "boundary": [0.0, 128.9, 0.0, 70.8], "objects": [{"uid": "1c137bfbd458453191b947299d6956c3", "name": "10_books_0_1c137bfbd458453191b947299d6956c3", "instance": "10_books_0", "position": [10.4, 39.7, 9.6], "size": [15.8, 18.7, 7.1], "rotation": [0.011826204136013985, 0.03972810134291649, 0.06321334093809128, 0.9971388578414917], "z_rotation": 0.12773719429969788, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "11_notepad_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "11_notepad_0", "position": [102.6, 24.8, 2.4], "size": [9.4, 9.6, 2.4], "rotation": [0.0, 0.0, -0.7148042917251587, 0.6993245482444763], "z_rotation": -1.5926884412765503, "moved": false, "glb": null}, {"uid": "c2f58583-d0fd-4a60-b45e-5bfc4321ea1c", "name": "12_notepad_notebook_0_c2f58583-d0fd-4a60-b45e-5bfc4321ea1c", "instance": "12_notepad_notebook_0", "position": [101.5, 18.8, 0.7], "size": [24.4, 33.8, 1.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "13_cup_1_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "13_cup_1", "position": [98.2, 51.6, 11.0], "size": [6.5, 6.6, 20.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "15_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "15_note_0", "position": [101.9, 11.9, 2.4], "size": [9.2, 9.5, 2.4], "rotation": [0.0, 0.0, -0.7325564622879028, 0.6807063221931458], "z_rotation": -1.6441400051116943, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "1_laptop_0_ef18ca96fff24272916d706db1f63d5a", "instance": "1_laptop_0", "position": [67.8, 43.7, 12.5], "size": [33.8, 33.2, 26.6], "rotation": [0.0, 0.0, -0.009672138839960098, 0.9999532103538513], "z_rotation": -0.019344577565789223, "moved": false, "glb": null}, {"uid": "3a67ee0a7768408a9540f84861ebb76f", "name": "2_phone_0_3a67ee0a7768408a9540f84861ebb76f", "instance": "2_phone_0", "position": [26.9, 12.8, 4.3], "size": [7.3, 15.4, 1.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "165f3870237f488885faf406d9deddc0", "name": "3_plant_0_165f3870237f488885faf406d9deddc0", "instance": "3_plant_0", "position": [29.3, 56.3, 4.7], "size": [19.6, 19.3, 9.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a1c2d8f832824dfe8bf2f0db0831ea02", "name": "4_plant_1_a1c2d8f832824dfe8bf2f0db0831ea02", "instance": "4_plant_1", "position": [45.1, 52.9, 23.2], "size": [11.5, 13.7, 28.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "e0058d59ac714df898d10ff56198a117", "name": "6_lamp_0_e0058d59ac714df898d10ff56198a117", "instance": "6_lamp_0", "position": [114.8, 54.4, 28.2], "size": [19.4, 34.9, 50.9], "rotation": [0.003109091892838478, 0.0015400811098515987, -0.31811457872390747, 0.9480459094047546], "z_rotation": -0.6474722027778625, "moved": false, "glb": null}, {"uid": "49cdc200eaf640489b99ca818165427a", "name": "7_stack_0_49cdc200eaf640489b99ca818165427a", "instance": "7_stack_0", "position": [10.4, 44.2, 3.0], "size": [17.5, 21.7, 6.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "9_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "9_notebook_0", "position": [24.8, 14.8, 2.8], "size": [19.9, 22.8, 5.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "a1c2d8f832824dfe8bf2f0db0831ea02", "name": "4_plant_1_a1c2d8f832824dfe8bf2f0db0831ea02", "instance": "4_plant_1", "position": [16.005693435668945, 88.43082427978516, 14.449999809265137], "size": [11.5, 13.7, 28.7], "rotation": [-0.8098436295801529, 0.4475521551000914, -0.07093454746329358, -0.3725837544363489], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "a1c2d8f832824dfe8bf2f0db0831ea02", "object_instance": "4_plant_1", "position_delta": 46.749124609965776, "rotation_delta": 2.378009269003045, "grasp_width": 0.08, "poses": [[0.451, 0.529, 0.33199999999999996], [0.451, 0.529, 0.23199999999999998], [0.451, 0.529, 0.33199999999999996], [0.16005693435668947, 0.8843082427978516, 0.24449999809265138], [0.16005693435668947, 0.8843082427978516, 0.14449999809265138], [0.16005693435668947, 0.8843082427978516, 0.24449999809265138]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
