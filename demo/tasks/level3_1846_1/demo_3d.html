<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1846_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1846_1", "boundary": [0.0, 114.2, 0.0, 76.8], "objects": [{"uid": "0e8155b9bf94494f9754901c53764942", "name": "10_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "10_pen_0", "position": [88.0, 11.9, 0.6], "size": [3.6, 9.7, 1.2], "rotation": [-0.0625898614525795, 0.0, 0.0, 0.9980393648147583], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "12_pencil_holder_0_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "12_pencil_holder_0", "position": [33.0, 66.8, 7.6], "size": [6.5, 9.4, 15.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "da9bb99cebeb46de97e4a0765d142ff2", "name": "15_tablet_notebook_0_da9bb99cebeb46de97e4a0765d142ff2", "instance": "15_tablet_notebook_0", "position": [28.0, 13.8, 2.3], "size": [11.5, 17.3, 2.3], "rotation": [-0.697632372379303, 0.12460409849882126, -0.12405280768871307, 0.6945458054542542], "z_rotation": -0.35349246859550476, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "16_calendar_tablet_notebook_0_26e240e2-8949-4c4f-aa03-05710a626", "instance": "16_calendar_tablet_notebook_0", "position": [100.0, 12.8, 0.7], "size": [16.2, 21.8, 1.3], "rotation": [0.0, 0.0, -0.999679684638977, 0.025309918448328972], "z_rotation": -3.0909674167633057, "moved": false, "glb": null}, {"uid": "78186f4073dd417e95c75e98fb0c717a", "name": "17_calendar_tablet_0_78186f4073dd417e95c75e98fb0c717a", "instance": "17_calendar_tablet_0", "position": [20.2, 44.9, 3.8], "size": [9.2, 1.3, 7.6], "rotation": [0.0, 0.0, 0.12251225858926773, 0.9924669861793518], "z_rotation": 0.24564169347286224, "moved": false, "glb": null}, {"uid": "d0271cf7-076d-4939-9a0d-8856c79dc3dc", "name": "1_mouse_0_d0271cf7-076d-4939-9a0d-8856c79dc3dc", "instance": "1_mouse_0", "position": [82.2, 10.1, 1.9], "size": [6.0, 9.4, 3.7], "rotation": [0.0, 0.0, -0.9956974387168884, 0.09266404062509537], "z_rotation": -2.955998420715332, "moved": false, "glb": null}, {"uid": "bd41c78c5d9246b08cd01364ec6ac8f8", "name": "2_glasses_0_bd41c78c5d9246b08cd01364ec6ac8f8", "instance": "2_glasses_0", "position": [33.6, 46.2, 1.7], "size": [9.4, 10.4, 3.2], "rotation": [0.0, 0.0, 0.2869397699832916, 0.957948625087738], "z_rotation": 0.5820614695549011, "moved": false, "glb": null}, {"uid": "9cad169b913545f683ae2a27080ca270", "name": "3_keyboard_0_9cad169b913545f683ae2a27080ca270", "instance": "3_keyboard_0", "position": [59.9, 17.4, 1.0], "size": [29.6, 10.1, 1.9], "rotation": [0.0, 0.0, -0.9999997615814209, 0.0006434081587940454], "z_rotation": -3.140305757522583, "moved": false, "glb": null}, {"uid": "49cdc200eaf640489b99ca818165427a", "name": "4_books_0_49cdc200eaf640489b99ca818165427a", "instance": "4_books_0", "position": [16.6, 63.6, 3.2], "size": [18.7, 23.3, 6.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "8c51d37795264cc99961417a56b3c1c0", "name": "5_speaker_0_8c51d37795264cc99961417a56b3c1c0", "instance": "5_speaker_0", "position": [84.1, 24.4, 2.0], "size": [9.1, 9.1, 4.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "7_computer_0_ef18ca96fff24272916d706db1f63d5a", "instance": "7_computer_0", "position": [61.2, 47.0, 15.2], "size": [38.6, 37.9, 30.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "7bfa596d1cfe44d298243636a0b611fc", "name": "9_notebook_1_7bfa596d1cfe44d298243636a0b611fc", "instance": "9_notebook_1", "position": [27.4, 13.7, 0.7], "size": [14.8, 18.8, 1.2], "rotation": [0.020220693200826645, -0.0100828493013978, -0.1828497350215912, 0.9828811883926392], "z_rotation": -0.368133544921875, "moved": false, "glb": null}], "target": {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "12_pencil_holder_0_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "12_pencil_holder_0", "position": [61.21050262451172, 24.365413665771484, 7.649999618530273], "size": [6.5, 9.4, 15.1], "rotation": [-0.6967833403269975, 0.06836881894839242, -0.7081740517289667, 0.09114929344834305], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "object_instance": "12_pencil_holder_0", "position_delta": 50.95614855585662, "rotation_delta": 2.9590406895858274, "grasp_width": 0.052000000000000005, "poses": [[0.33, 0.668, 0.176], [0.33, 0.668, 0.076], [0.33, 0.668, 0.176], [0.6121050262451172, 0.24365413665771485, 0.17649999618530274], [0.6121050262451172, 0.24365413665771485, 0.07649999618530273], [0.6121050262451172, 0.24365413665771485, 0.17649999618530274]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
