<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_0770_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_0770_1", "boundary": [0.0, 109.0, 0.0, 65.9], "objects": [{"uid": "b318d35d11c64c91984f55773cb4154f", "name": "10_bottle_0_b318d35d11c64c91984f55773cb4154f", "instance": "10_bottle_0", "position": [64.3, 43.4, 8.3], "size": [6.6, 6.5, 16.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "5899d997-4d52-4918-97b5-32195cbe58fb", "name": "11_papers_0_5899d997-4d52-4918-97b5-32195cbe58fb", "instance": "11_papers_0", "position": [10.3, 25.2, 0.6], "size": [11.3, 14.3, 1.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_8b10a834-a777-4149-957d-4db0a3ab4d0d", "name": "13_file_folder_1_gen_8b10a834-a777-4149-957d-4db0a3ab4d0d", "instance": "13_file_folder_1", "position": [7.2, 45.6, 9.2], "size": [21.6, 4.9, 18.6], "rotation": [0.0, 0.0, -0.7333608269691467, 0.6798396110534668], "z_rotation": -1.6465047597885132, "moved": false, "glb": null}, {"uid": "5899d997-4d52-4918-97b5-32195cbe58fb", "name": "14_papers_2_5899d997-4d52-4918-97b5-32195cbe58fb", "instance": "14_papers_2", "position": [35.0, 16.0, 1.1], "size": [21.6, 27.4, 2.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "5899d997-4d52-4918-97b5-32195cbe58fb", "name": "15_papers_3_5899d997-4d52-4918-97b5-32195cbe58fb", "instance": "15_papers_3", "position": [60.6, 16.2, 1.1], "size": [21.5, 27.2, 2.4], "rotation": [0.0, 0.0, 0.07155296206474304, 0.9974368214607239], "z_rotation": 0.14322832226753235, "moved": false, "glb": null}, {"uid": "73c023c90f8d45fb88294bccade836c0", "name": "1_alarm_clock_0_73c023c90f8d45fb88294bccade836c0", "instance": "1_alarm_clock_0", "position": [64.1, 37.1, 4.1], "size": [5.8, 2.8, 8.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_8b10a834-a777-4149-957d-4db0a3ab4d0d", "name": "20_folder_1_gen_8b10a834-a777-4149-957d-4db0a3ab4d0d", "instance": "20_folder_1", "position": [12.1, 45.1, 9.1], "size": [21.4, 4.8, 18.4], "rotation": [0.0, 0.0, -0.7333608269691467, 0.6798396110534668], "z_rotation": -1.6465047597885132, "moved": false, "glb": null}, {"uid": "0c0edb114d324eab9106f331244621c5", "name": "2_keyboard_0_0c0edb114d324eab9106f331244621c5", "instance": "2_keyboard_0", "position": [35.0, 19.1, 3.4], "size": [11.0, 28.3, 2.2], "rotation": [0.0, 0.0, -0.7071068286895752, 0.7071067094802856], "z_rotation": -1.5707963705062866, "moved": false, "glb": null}, {"uid": "e70a801a88c34f078133e78e93f277b3", "name": "3_desk_lamp_0_e70a801a88c34f078133e78e93f277b3", "instance": "3_desk_lamp_0", "position": [82.9, 48.4, 26.0], "size": [44.6, 27.5, 52.1], "rotation": [0.0, 0.0, -0.997939944267273, 0.06415469199419022], "z_rotation": -3.013195037841797, "moved": false, "glb": null}, {"uid": "8ac16bda501c4bcc8ba93ac3eb63a8e1", "name": "6_computer_0_8ac16bda501c4bcc8ba93ac3eb63a8e1", "instance": "6_computer_0", "position": [36.6, 45.2, 13.9], "size": [39.1, 28.1, 28.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "7_pencil_holder_0_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "7_pencil_holder_0", "position": [93.4, 43.1, 4.8], "size": [7.0, 10.0, 9.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "8_pencil_holder_1_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "8_pencil_holder_1", "position": [82.3, 54.5, 10.8], "size": [8.5, 12.2, 13.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "b318d35d11c64c91984f55773cb4154f", "name": "10_bottle_0_b318d35d11c64c91984f55773cb4154f", "instance": "10_bottle_0", "position": [82.77810668945312, 10.199984550476074, 8.5], "size": [6.6, 6.5, 16.8], "rotation": [-0.15201445531082672, 0.700056916836939, -0.6830438682769113, 0.14234813864123816], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "b318d35d11c64c91984f55773cb4154f", "object_instance": "10_bottle_0", "position_delta": 37.99633472685806, "rotation_delta": 2.855926035676158, "grasp_width": 0.052000000000000005, "poses": [[0.643, 0.434, 0.183], [0.643, 0.434, 0.083], [0.643, 0.434, 0.183], [0.8277810668945312, 0.10199984550476074, 0.185], [0.8277810668945312, 0.10199984550476074, 0.085], [0.8277810668945312, 0.10199984550476074, 0.185]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
