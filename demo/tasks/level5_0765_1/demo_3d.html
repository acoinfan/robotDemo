    const data = {"task": "level5_0765_1", "boundary": [0.0, 124.7, 0.0, 62.0], "objects": [{"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "11_pen_holder_0_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "11_pen_holder_0", "position": [99.7, 39.8, 10.9], "size": [9.4, 13.4, 21.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "78f9d370-cb5f-40c1-9d03-2593eead4775", "name": "13_water_0_78f9d370-cb5f-40c1-9d03-2593eead4775", "instance": "13_water_0", "position": [32.8, 10.6, 0.5], "size": [1.0, 5.9, 1.0], "rotation": [0.7093308568000793, 0.0, 0.0, 0.7048757076263428], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "49cdc200eaf640489b99ca818165427a", "name": "14_books_0_49cdc200eaf640489b99ca818165427a", "instance": "14_books_0", "position": [20.6, 47.6, 14.6], "size": [25.4, 8.8, 31.7], "rotation": [-0.5026942491531372, -0.498510479927063, 0.4973013997077942, 0.5014749765396118], "z_rotation": 1.56243896484375, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "17_pen_holder_2_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "17_pen_holder_2", "position": [26.3, 28.7, 8.4], "size": [7.1, 10.3, 16.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "212f2713f3704907a2ca16c1546cb8f7", "name": "1_mouse_0_212f2713f3704907a2ca16c1546cb8f7", "instance": "1_mouse_0", "position": [91.8, 14.9, 2.2], "size": [7.0, 10.3, 4.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "568d12fb0f8b419caea4251c9d837ba3", "name": "20_books_1_568d12fb0f8b419caea4251c9d837ba3", "instance": "20_books_1", "position": [28.0, 47.3, 15.2], "size": [6.6, 27.6, 30.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "49cdc200eaf640489b99ca818165427a", "name": "23_books_2_49cdc200eaf640489b99ca818165427a", "instance": "23_books_2", "position": [34.9, 47.2, d_0", "position": [62.3, 22.0, 1.1], "size": [37.0, 9.6, 2.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "76703d06-7adf-442e-be95-7dde6ce265e6", "name": "5_calculator_0_76703d06-7adf-442e-be95-7dde6ce265e6", "instance": "5_calculator_0", "position": [23.5, 13.7, 4.7], "size": [6.6, 10.7, 2.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "d4f97917-cb22-4f9e-ac95-32aa4dc716b9", "name": "7_glass_0_d4f97917-cb22-4f9e-ac95-32aa4dc716b9", "instance": "7_glass_0", "position": [36.1, 27.6, 6.8], "size": [9.5, 9.4, 13.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "8_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "8_pen_0", "position": [109.9, 16.3, 5.2], "size": [3.7, 9.8, 1.3], "rotation": [-0.05146881937980652, 0.006348373368382454, 0.1222517192363739, 0.9911433458328247], "z_rotation": 0.2441803216934204, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "9_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "9_notebook_0", "position": [107.0, 14.8, 2.9], "size": [20.8, 23.6, 5.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "6fc84b3f-99a1-4d77-b83f-324a46cd8682", "name": "25_books_3_6fc84b3f-99a1-4d77-b83f-324a46cd8682", "instance": "25_books_3", "position": [94.8854751586914, 53.436012268066406, 3.3207814693450928], "size": [26.2, 6.8, 30.6], "rotation": [-0.27305424862281813, -0.6497369647792237, 0.6506717558019696, 0.28268271986467813], "z_rotation": -1.5916634798049927, "moved": true, "glb": null}, "plan": {"object_uid": "6fc84b3f-99a1-4d77-b83f-324a46cd8682", "object_instance": "25_books_3", "position_delta": 82.85817115387084, "rotation_delta": 2.3577211450447977, "grasp_width": 0.054400000000000004, "poses": [[0.13, 0.48100000000000004, 0.24800000000000003], [0.13, 0.48100000000000004, 0.14800000000000002], [0.13, 0.48100000000000004, 0.24800000000000003], [0.9488547515869141, 0.5343601226806641, 0.13320781469345094], [0.9488547515869141, 0.5343601226806641, 0.03320781469345093], [0.9488547515869141, 0.5343601226806641, 0.13320781469345094]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
