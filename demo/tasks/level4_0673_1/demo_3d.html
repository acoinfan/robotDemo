<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_0673_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }

    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }

</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {

  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0673_1", "boundary": [0.0, 108.8, 0.0, 64.3], "objects": [{"uid": "0adcf1771a3c4b5c922c47dd09d149b0", "name": "10_stapler_0_0adcf1771a3c4b5c922c47dd09d149b0", "instance": "10_stapler_0", "position": [16.8, 32.3, 2.8], "size": [2.5, 14.9, 5.5], "rotation": [0.0, 0.0, -0.42492422461509705, 0.9052289128303528], "z_rotation": -0.8777562975883484, "moved": false, "glb": null}, {"uid": "ad481de8-681c-427c-8e53-e17b1ad2b9c6", "name": "11_tape_dispenser_0_ad481de8-681c-427c-8e53-e17b1ad2b9c6", "instance": "11_tape_dispenser_0", "position": [68.4, 38.4, 2.0], "size": [10.0, 3.7, 4.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "4842e147554b4a06ad061cc2ab89ccda", "name": "12_highlighter_pen_0_4842e147554b4a06ad061cc2ab89ccda", "instance": "12_highlighter_pen_0", "position": [73.4, 13.7, 0.2], "size": [9.8, 0.7, 0.6], "rotation": [0.0, 0.0, -0.6954361200332642, 0.7185879349708557], "z_rotation": -1.538053274154663, "moved": false, "glb": null}, {"uid": "a1d3863e00b846f9ac7ea24551791e9e", "name": "13_computer_0_a1d3863e00b846f9ac7ea24551791e9e", "instance": "13_computer_0", "position": [46.4, 51.2, 27.0], "size": [19.7, 48.1, 53.9], "rotation": [0.0, 0.0, 0.7108933925628662, 0.7032998204231262], "z_rotation": 1.5815353393554688, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "14_highlighter_binder_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "14_highlighter_binder_0", "position": [48.2, 13.2, 1.6], "size": [9.1, 12.6, 3.1], "rotation": [0.0, 0.0, 0.3098004460334778, 0.9508016109466553], "z_rotation": 0.6299662590026855, "moved": false, "glb": null}, {"uid": "gen_919b53ee-319b-4c80-bb39-e9abe4717fc3", "name": "15_highlighter_binder_clip_0_gen_919b53ee-319b-4c80-bb39-e9abe4", "instance": "15_highlighter_binder_clip_0", "position": [57.2, 16.2, 2.6], "size": [3.0, 7.2, 5.2], "rotation": [0.0, 0.0, -0.2706344425678253, 0.9626821875572205], "z_rotation": -0.548104 9a852929bfdfa0fa", "instance": "6_printer_0", "position": [91.4, 53.0, 5.0], "size": [30.0, 19.2, 12.5], "rotation": [-0.03169487416744232, -0.00020539588876999915, -0.006477020680904388, 0.9994766116142273], "z_rotation": -0.012934605590999126, "moved": true, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "7_mouse_pad_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "7_mouse_pad_0", "position": [66.5, 29.4, 1.1], "size": [5.6, 11.0, 2.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "921ea963c74c4d71880d49a37eac19bc", "name": "8_notebook_0_921ea963c74c4d71880d49a37eac19bc", "instance": "8_notebook_0", "position": [32.5, 13.8, 1.8], "size": [15.6, 20.8, 3.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0be004df7a6243aa8f21b95e8675b9c1", "name": "9_pen_0_0be004df7a6243aa8f21b95e8675b9c1", "instance": "9_pen_0", "position": [21.8, 13.3, 0.5], "size": [1.1, 12.1, 1.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "0c5f631d3dbf4a519a852929bfdfa0fa", "name": "6_printer_0_0c5f631d3dbf4a519a852929bfdfa0fa", "instance": "6_printer_0", "position": [33.18989562988281, 31.700193405151367, 6.350000381469727], "size": [30.0, 19.2, 12.5], "rotation": [-0.5192954481391991, -0.4743672694191465, 0.4557892813705823, 0.5454943283237869], "z_rotation": -0.012934605590999126, "moved": true, "glb": null}, "plan": {"object_uid": "0c5f631d3dbf4a519a852929bfdfa0fa", "object_instance": "6_printer_0", "position_delta": 61.999358970781806, "rotation_delta": 1.9556849021854898, "grasp_width": 0.08, "poses": [[0.914, 0.53, 0.15000000000000002], [0.914, 0.53, 0.05], [0.914, 0.53, 0.15000000000000002], [0.33189895629882815, 0.31700193405151367, 0.16350000381469726], [0.33189895629882815, 0.31700193405151367, 0.06350000381469727], [0.33189895629882815, 0.31700193405151367, 0.16350000381469726]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
