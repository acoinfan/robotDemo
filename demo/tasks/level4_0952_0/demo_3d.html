<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_0952_0</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"

    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0952_0", "boundary": [0.0, 113.5, 0.0, 68.0], "objects": [{"uid": "0e8155b9bf94494f9754901c53764942", "name": "10_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "10_pen_0", "position": [11.9, 16.1, 2.0], "size": [3.8, 10.1, 1.3], "rotation": [-0.04822082445025444, -0.02508905529975891, -0.46087685227394104, 0.8857978582382202], "z_rotation": -0.9567157030105591, "moved": true, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "11_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "11_pen_1", "position": [47.8, 16.1, 2.3], "size": [3.6, 9.7, 1.2], "rotation": [-0.01768975704908371, -0.07010956853628159, 0.9798690676689148, 0.186086967587471], "z_rotation": 2.7656219005584717, "moved": true, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "13_pen_2_0e8155b9bf94494f9754901c53764942", "instance": "13_pen_2", "position": [9.5, 38.3, 1.3], "size": [4.3, 11.3, 1.3], "rotation": [0.0, -0.18282438814640045, 0.0, 0.9831455945968628], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "119d5abe285545559f2a8b25760f7354", "name": "14_notebook_1_119d5abe285545559f2a8b25760f7354", "instance": "14_notebook_1", "position": [11.8, 16.0, 1.1], "size": [13.9, 18.8, 2.2], "rotation": [0.0, 0.0, -0.2886449694633484, 0.957436203956604], "z_rotation": -0.5856224894523621, "moved": false, "glb": null}, {"uid": "d4f97917-cb22-4f9e-ac95-32aa4dc716b9", "name": "15_glass_0_d4f97917-cb22-4f9e-ac95-32aa4dc716b9", "instance": "15_glass_0", "position": [19.9, 30.0, 5.4], "size": [7.4, 7.4, 10.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "18_sticky_note_1_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "18_sticky_note_1", "position": [72.0, 46.8, 0.7], "size": [12.5, 12.6, 1.7], "rotation": [0.0, -0.08230562508106232, 0.0, 0.9966071248054504], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "19_pen_3_0e8155b9bf94494f9754901c53764942", "instance": "19_pen_3", "position": [6.7, 37.2, 0.7], "size": [5.3, 13.4, 1.7], "rotation": [0.0, -0.16445577144622803, 0.0, 0.9863844513893127], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "1_laptop_0_ef18ca96fff24272916d706db1f63d5a", "instance": "1_laptop_0", "position": [46.2, 48.5, 10.0], "size": [31.6, 34.9, 19.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "21_pen_4_0e8155b9bf94494f9754901c53764942", "instance": "21_pen_4", "position": [8.2, 37.6, 1.0], "size": [6.0, 15.6, 1.9], "rotation": [0.0, -0.18627874553203583, 0.0, 0.9824969172477722], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "gen_335ab012-6c35-413c-882b-425a7975d7a6", "name": "23_pencil_holder_1_gen_335ab012-6c35-413c-882b-425a7975d7a6", "instance": "23_pencil_holder_1", "position": [15.1, 41.0, 8.0], "size": [8.4, 8.4, 15.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "3923dbced4e64a479efcad63ba8e3e03", "name": "2_smartphone_0_3923dbced4e64a479efcad63ba8e3e03", "instance": "2_smartphone_0", "position": [30.6, 17.5, 0.1], "size": [5.0, 10.2, 0.5], "rotation": [0.0, 0.0, 0.13468439877033234, 0.9908885359764099], "z_rotation": 0.27018991112709045, "moved": false, "glb": null}, {"uid": "ad481de8-681c-427c-8e53-e17b1ad2b9c6", "name": "7_holder_tape_dispenser_0_ad481de8-681c-427c-8e53-e17b1ad2b9c6", "instance": "7_holder_tape_dispenser_0", "position": [74.4, 20.4, 1.8], "size": [8.9, 3.4, 3.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "8_notebook_0_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "8_notebook_0", "position": [46.9, 15.2, 1.2], "size": [20.6, 27.8, 1.8], "rotation": [0.0, 0.0, -0.9999998807907104, 0.0004787466023117304], "z_rotation": -3.1406352519989014, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "9_sticky_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "9_sticky_note_0", "position": [74.0, 31.2, 0.8], "size": [9.8, 10.0, 1.2], "rotation": [0.022265547886490822, -0.09963138401508331, 0.21695995330810547, 0.9708276391029358], "z_rotation": 0.4397332966327667, "moved": false, "glb": null}], "target": {"uid": "0e8155b9bf94494f9754901c53764942", "name": "21_pen_4_0e8155b9bf94494f9754901c53764942", "instance": "21_pen_4", "position": [9.696589469909668, 31.007740020751953, 0.5742655396461487], "size": [6.0, 15.6, 1.9], "rotation": [0.1898650802258115, -0.35176489974140224, 0.193947007712798, 0.8958779296422138], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "0e8155b9bf94494f9754901c53764942", "object_instance": "21_pen_4", "position_delta": 6.7733980767538515, "rotation_delta": 0.6619641941188598, "grasp_width": 0.048, "poses": [[0.08199999999999999, 0.376, 0.11], [0.08199999999999999, 0.376, 0.01], [0.08199999999999999, 0.376, 0.11], [0.09696589469909668, 0.31007740020751956, 0.1057426553964615], [0.09696589469909668, 0.31007740020751956, 0.005742655396461487], [0.09696589469909668, 0.31007740020751956, 0.1057426553964615]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
