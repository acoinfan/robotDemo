<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_1245_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_1245_1", "boundary": [0.0, 103.7, 0.0, 68.2], "objects": [{"uid": "f6980f8fc24547348d15627d2af99c0c", "name": "10_pen_pencil_0_f6980f8fc24547348d15627d2af99c0c", "instance": "10_pen_pencil_0", "position": [83.4, 9.6, 0.4], "size": [10.4, 0.6, 0.6], "rotation": [0.0, 0.0, 0.8734286427497864, 0.48695215582847595], "z_rotation": 2.124398946762085, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "11_pen_pencil_1_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "11_pen_pencil_1", "position": [23.9, 60.8, 11.9], "size": [10.2, 14.8, 23.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "3e715fb590ba457e91ab3bd5c32ca876", "name": "16_##er_clip_0_3e715fb590ba457e91ab3bd5c32ca876", "instance": "16_##er_clip_0", "position": [93.1, 13.3, 1.1], "size": [2.6, 7.0, 2.9], "rotation": [0.08427450060844421, 0.6970749497413635, -0.5342215299606323, 0.4707352817058563], "z_rotation": 0.6176605224609375, "moved": false, "glb": null}, {"uid": "gen_919b53ee-319b-4c80-bb39-e9abe4717fc3", "name": "18_##er_clip_1_gen_919b53ee-319b-4c80-bb39-e9abe4717fc3", "instance": "18_##er_clip_1", "position": [84.6, 19.1, 1.6], "size": [1.7, 4.0, 2.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "1_laptop_0_ef18ca96fff24272916d706db1f63d5a", "instance": "1_laptop_0", "position": [52.0, 48.1, 12.4], "size": [31.6, 31.1, 24.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "901330d6-d5e1-468d-8365-d5707590a274", "name": "20_##er_clip_2_901330d6-d5e1-468d-8365-d5707590a274", "instance": "20_##er_clip_2", "position": [87.5, 13.4, 0.1], "size": [1.3, 6.2, 0.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "901330d6-d5e1-468d-8365-d5707590a274", "name": "21_##er_clip_3_901330d6-d5e1-468d-8365-d5707590a274", "instance": "21_##er_clip_3", "position": [15.4, 15.0, 0.1], "size": [0.7, 3.2, 0.1], "rotation": [0.0, 0.0, -0.603441059589386, 0.7974076271057129], "z_rotation": -1.2956187725067139, "moved": false, "glb": null}, {"uid": "40465ef52f024a7984abf94930144a0a", "name": "2_coffee_cup_0_40465ef52f024a7984abf94930144a0a", "instance": "2_coffee_cup_0", "position": [76.2, 41.8, 4.0], "size": [10.3, 7.8, 7.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e0058d59ac714df898d10ff56198a117", "name": "3_lamp_0_e0058d59ac714df898d10ff56198a117", "instance": "3_lamp_0", "position": [91.4, 50.6, 18.2], "size": [13.9, 25.0, 36.6], "rotation": [0.0, 0.0, -0.5641201734542847, 0.8256927132606506], "z_rotation": -1.1987346410751343, "moved": false, "glb": null}, {"uid": "3923dbced4e64a479efcad63ba8e3e03", "name": "4_smartphone_0_3923dbced4e64a479efcad63ba8e3e03", "instance": "4_smartphone_0", "position": [74.9, 11.5, 0.4], "size": [7.7, 15.6, 0.7], "rotation": [0.0, 0.0, 0.08395757526159286, 0.9964693188667297], "z_rotation": 0.1681130975484848, "moved": true, "glb": null}, {"uid": "0adcf1771a3c4b5c922c47dd09d149b0", "name": "5_stapler_0_0adcf1771a3c4b5c922c47dd09d149b0", "instance": "5_stapler_0", "position": [30.1, 43.4, 3.0], "size": [3.0, 13.8, 5.9], "rotation": [0.0, 0.0, 0.9651623368263245, 0.2616518437862396], "z_rotation": 2.612126111984253, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "6_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "6_notebook_0", "position": [50.5, 16.4, 3.4], "size": [24.2, 27.7, 6.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "119d5abe285545559f2a8b25760f7354", "name": "7_notebook_1_119d5abe285545559f2a8b25760f7354", "instance": "7_notebook_1", "position": [15.5, 25.1, 1.1], "size": [14.6, 19.9, 2.3], "rotation": [0.0, 0.0, 0.7589083909988403, 0.6511974334716797], "z_rotation": 1.723270297050476, "moved": false, "glb": null}], "target": {"uid": "3923dbced4e64a479efcad63ba8e3e03", "name": "4_smartphone_0_3923dbced4e64a479efcad63ba8e3e03", "instance": "4_smartphone_0", "position": [83.54916381835938, 64.29290008544922, 0.30073922872543335], "size": [7.7, 15.6, 0.7], "rotation": [0.0, 0.0, -0.958464122843463, 0.2851767627301981], "z_rotation": 0.1681130975484848, "moved": true, "glb": null}, "plan": {"object_uid": "3923dbced4e64a479efcad63ba8e3e03", "object_instance": "4_smartphone_0", "position_delta": 53.49680538957214, "rotation_delta": 2.731317844614743, "grasp_width": 0.0616, "poses": [[0.7490000000000001, 0.115, 0.10400000000000001], [0.7490000000000001, 0.115, 0.004], [0.7490000000000001, 0.115, 0.10400000000000001], [0.8354916381835937, 0.6429290008544922, 0.10300739228725433], [0.8354916381835937, 0.6429290008544922, 0.0030073922872543334], [0.8354916381835937, 0.6429290008544922, 0.10300739228725433]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
