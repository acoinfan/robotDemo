<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_1297_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_1297_1", "boundary": [0.0, 94.9, 0.0, 67.6], "objects": [{"uid": "7cd5c7e5be624ca48e072326ed6a1da2", "name": "12_sticky_note_sticky_note_pad_1_7cd5c7e5be624ca48e072326ed6a1d", "instance": "12_sticky_note_sticky_note_pad_1", "position": [80.9, 34.7, 0.5], "size": [5.5, 5.6, 0.8], "rotation": [0.03178158402442932, -0.0034383004531264305, 0.107502780854702, 0.9936907291412354], "z_rotation": 0.21510541439056396, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "13_sticky_note_sticky_note_pad_2_0c89c545d39d43b28c9ce60cedfc0f", "instance": "13_sticky_note_sticky_note_pad_2", "position": [74.2, 28.9, 0.6], "size": [5.2, 5.3, 1.3], "rotation": [0.0, 0.0, -0.21958327293395996, 0.9755937457084656], "z_rotation": -0.44277462363243103, "moved": false, "glb": null}, {"uid": "8efaf047e51145d7babd4ee0cdc23539", "name": "14_eraser_0_8efaf047e51145d7babd4ee0cdc23539", "instance": "14_eraser_0", "position": [24.0, 30.8, 0.6], "size": [2.2, 5.2, 1.1], "rotation": [0.0, 0.0, -0.5328801274299622, 0.8461907505989075], "z_rotation": -1.124001145362854, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "16_pencil_holder_0_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "16_pencil_holder_0", "position": [84.1, 59.5, 10.1], "size": [8.6, 12.4, 20.2], "rotation": [0.0, 0.0, -0.0958171859383583, 0.9953989386558533], "z_rotation": -0.19192883372306824, "moved": false, "glb": null}, {"uid": "7cd5c7e5be624ca48e072326ed6a1da2", "name": "19_sticky_note_pad_0_7cd5c7e5be624ca48e072326ed6a1da2", "instance": "19_sticky_note_pad_0", "position": [88.2, 27.0, 0.5], "size": [5.2, 5.2, 0.7], "rotation": [0.009729985147714615, 0.0, 0.0, 0.9999526739120483], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "212f2713f3704907a2ca16c1546cb8f7", "name": "1_mouse_0_212f2713f3704907a2ca16c1546cb8f7", "instance": "1_mouse_0", "position": [78.5, 20.3, 1.7], "size": [5.5, 8.4, 3.5], "rotation": [0.0, 0.0, 0.04547375440597534, 0.9989655613899231], "z_rotation": 0.09097888320684433, "moved": false, "glb": null}, {"uid": "9cad169b913545f683ae2a27080ca270", "name": "2_keyboard_0_9cad169b913545f683ae2a27080ca270", "instance": "2_keyboard_0", "position": [49.4, 24.1, 1.2], "size": [38.2, 12.1, 2.4], "rotation": [0.0, 0.0, -0.9999988675117493, 0.0015070337103679776], "z_rotation": -3.1385786533355713, "moved": false, "glb": null}, {"uid": "01a07e8fd8dd42158971fd5e32c5fadf", "name": "3_potted_plant_0_01a07e8fd8dd42158971fd5e32c5fadf", "instance": "3_potted_plant_0", "position": [13.0, 57.6, 8.8], "size": [10.8, 11.2, 17.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "3923dbced4e64a479efcad63ba8e3e03", "name": "4_smartphone_0_3923dbced4e64a479efcad63ba8e3e03", "instance": "4_smartphone_0", "position": [11.2, 31.8, 3.5], "size": [4.9, 10.2, 0.5], "rotation": [0.0, 0.0, 0.13611941039562225, 0.9906924366950989], "z_rotation": 0.2730866074562073, "moved": false, "glb": null}, {"uid": "489266e9e2c44b5fbba13b2d933956f8", "name": "5_clock_0_489266e9e2c44b5fbba13b2d933956f8", "instance": "5_clock_0", "position": [81.7, 49.6, 4.3], "size": [7.7, 4.8, 8.5], "rotation": [0.0, 0.0, -0.1862649917602539, 0.9824995398521423], "z_rotation": -0.37471845746040344, "moved": true, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "6_computer_0_ef18ca96fff24272916d706db1f63d5a", "instance": "6_computer_0", "position": [49.4, 49.4, 12.6], "size": [47.6, 31.6, 25.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "8_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "8_notebook_0", "position": [12.6, 29.8, 2.0], "size": [14.5, 16.6, 4.0], "rotation": [0.0, 0.0, 0.21347127854824066, 0.9769493341445923], "z_rotation": 0.4302535057067871, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "9_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "9_pen_0", "position": [24.5, 15.2, 1.1], "size": [5.4, 14.5, 1.9], "rotation": [-0.07797082513570786, -0.013783538714051247, -0.17353293299674988, 0.9816399216651917], "z_rotation": -0.34589752554893494, "moved": false, "glb": null}], "target": {"uid": "489266e9e2c44b5fbba13b2d933956f8", "name": "5_clock_0_489266e9e2c44b5fbba13b2d933956f8", "instance": "5_clock_0", "position": [45.43743896484375, 27.05270004272461, 4.539760112762451], "size": [7.7, 4.8, 8.5], "rotation": [-0.6227215096561796, -0.2958306695792176, 0.2975837499565604, 0.6604135432512207], "z_rotation": -0.37471845746040344, "moved": true, "glb": null}, "plan": {"object_uid": "489266e9e2c44b5fbba13b2d933956f8", "object_instance": "5_clock_0", "position_delta": 42.701423314726355, "rotation_delta": 1.870973867088879, "grasp_width": 0.038400000000000004, "poses": [[0.8170000000000001, 0.49600000000000005, 0.14300000000000002], [0.8170000000000001, 0.49600000000000005, 0.043], [0.8170000000000001, 0.49600000000000005, 0.14300000000000002], [0.4543743896484375, 0.2705270004272461, 0.1453976011276245], [0.4543743896484375, 0.2705270004272461, 0.04539760112762451], [0.4543743896484375, 0.2705270004272461, 0.1453976011276245]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
