<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_0377_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_0377_1", "boundary": [0.0, 113.5, 0.0, 67.6], "objects": [{"uid": "gen_4c6ae53b-5b30-484a-a8ce-dde4a3a52fda", "name": "10_calendar_0_gen_4c6ae53b-5b30-484a-a8ce-dde4a3a52fda", "instance": "10_calendar_0", "position": [91.2, 52.3, 7.3], "size": [19.3, 12.5, 14.6], "rotation": [0.0, 0.0, -0.17500777542591095, 0.9845670461654663], "z_rotation": -0.35182735323905945, "moved": true, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "13_pen_holder_1_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "13_pen_holder_1", "position": [100.4, 62.3, 8.4], "size": [7.2, 10.3, 16.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "16_pen_3_0e8155b9bf94494f9754901c53764942", "instance": "16_pen_3", "position": [105.5, 60.6, 0.5], "size": [2.9, 7.8, 1.1], "rotation": [-0.08032616227865219, -0.01129829604178667, -0.13882550597190857, 0.9869891405105591], "z_rotation": -0.27598488330841064, "moved": false, "glb": null}, {"uid": "0a46feae77af42c3b37c149b11d35c6a", "name": "17_desk_lamp_1_0a46feae77af42c3b37c149b11d35c6a", "instance": "17_desk_lamp_1", "position": [16.2, 47.8, 14.8], "size": [12.1, 22.0, 29.4], "rotation": [0.0, 0.0, 0.4141136109828949, 0.9102252125740051], "z_rotation": 0.8539375066757202, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "1_laptop_0_ef18ca96fff24272916d706db1f63d5a", "instance": "1_laptop_0", "position": [60.6, 39.8, 12.8], "size": [32.8, 32.2, 25.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "212f2713f3704907a2ca16c1546cb8f7", "name": "2_mouse_0_212f2713f3704907a2ca16c1546cb8f7", "instance": "2_mouse_0", "position": [88.1, 23.8, 1.7], "size": [5.4, 8.0, 3.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "20067975d06343489bd455c6c5821f33", "name": "3_cup_0_20067975d06343489bd455c6c5821f33", "instance": "3_cup_0", "position": [89.5, 39.4, 1.8], "size": [7.4, 7.7, 3.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "36d84de6-e54e-4197-b24f-cf3e0223fb1c", "name": "4_glasses_0_36d84de6-e54e-4197-b24f-cf3e0223fb1c", "instance": "4_glasses_0", "position": [75.5, 14.5, 1.3], "size": [10.2, 10.2, 2.5], "rotation": [0.0, 0.0, -0.11556919664144516, 0.9932994246482849], "z_rotation": -0.231656014919281, "moved": false, "glb": null}, {"uid": "cee4802cafe3483c9d72f27d6f3e06d1", "name": "5_notepad_0_cee4802cafe3483c9d72f27d6f3e06d1", "instance": "5_notepad_0", "position": [41.8, 13.9, 2.2], "size": [12.2, 19.3, 4.3], "rotation": [0.0, 0.0, 0.41153156757354736, 0.9113954901695251], "z_rotation": 0.8482677340507507, "moved": false, "glb": null}, {"uid": "e6b33c4c7e1c461db5d5c568b9dfca71", "name": "6_potted_plant_0_e6b33c4c7e1c461db5d5c568b9dfca71", "instance": "6_potted_plant_0", "position": [8.6, 36.1, 13.2], "size": [12.8, 12.8, 26.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "7_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "7_pen_0", "position": [43.2, 14.0, 3.4], "size": [3.0, 7.9, 1.1], "rotation": [-0.08251034468412399, 0.0, 0.0, 0.9965901970863342], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "c483b67d-4d32-4a5b-8bd5-1e8a2c2e59ed", "name": "8_potted_plant_1_c483b67d-4d32-4a5b-8bd5-1e8a2c2e59ed", "instance": "8_potted_plant_1", "position": [25.6, 58.8, 9.5], "size": [14.3, 16.1, 19.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "gen_4c6ae53b-5b30-484a-a8ce-dde4a3a52fda", "name": "10_calendar_0_gen_4c6ae53b-5b30-484a-a8ce-dde4a3a52fda", "instance": "10_calendar_0", "position": [54.11833953857422, 60.064212799072266, 7.400000095367432], "size": [19.3, 12.5, 14.6], "rotation": [0.0, 0.7978823101832683, -0.6016879779380648, 0.0], "z_rotation": -0.35182735323905945, "moved": true, "glb": null}, "plan": {"object_uid": "gen_4c6ae53b-5b30-484a-a8ce-dde4a3a52fda", "object_instance": "10_calendar_0", "position_delta": 37.885914836319046, "rotation_delta": 2.9304576879948514, "grasp_width": 0.08, "poses": [[0.912, 0.523, 0.173], [0.912, 0.523, 0.073], [0.912, 0.523, 0.173], [0.5411833953857422, 0.6006421279907227, 0.17400000095367432], [0.5411833953857422, 0.6006421279907227, 0.07400000095367432], [0.5411833953857422, 0.6006421279907227, 0.17400000095367432]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
