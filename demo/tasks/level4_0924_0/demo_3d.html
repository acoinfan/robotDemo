  <style>

<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>

  <script type="importmap">
    {

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0924_0", "boundary": [0.0, 117.7, 0.0, 71.6], "objects": [{"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "10_planner_notebook_0_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "10_planner_notebook_0", "position": [50.5, 13.4, 0.7], "size": [16.7, 22.6, 1.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "11_pencil_holder_1_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "11_pencil_holder_1", "position": [20.9, 36.6, 10.4], "size": [8.9, 12.8, 20.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "49cdc200eaf640489b99ca818165427a", "name": "12_books_0_49cdc200eaf640489b99ca818165427a", "instance": "12_books_0", "position": [101.3, 45.8, 9.5], "size": [21.5, 26.6, 7.4], "rotation": [0.0, 0.0, -0.9999996423721313, 0.0008341526263393462], "z_rotation": -3.1399242877960205, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "13_planner_notebook_1_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "13_planner_notebook_1", "position": [101.9, 45.6, 13.9], "size": [20.6, 28.0, 1.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "14_notebook_0_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "14_notebook_0", "position": [67.4, 13.4, 0.7], "size": [16.6, 22.3, 1.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "8ac16bda501c4bcc8ba93ac3eb63a8e1", "name": "1_laptop_0_8ac16bda501c4bcc8ba93ac3eb63a8e1", "instance": "1_laptop_0", "position": [61.3, 41.6, 15.7], "size": [44.3, 28.6, 31.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "6fc84b3f-99a1-4d77-b83f-324a46cd8682", "name": "2_stack_0_6fc84b3f-99a1-4d77-b83f-324a46cd8682", "instance": "2_stack_0", "position": [101.2, 46.0, 2.9], "size": [22.1, 26.6, 5.8], "rotation": [0.0, 0.0, -0.9999996423721313, 0.0008341533248312771], "z_rotation": -3.1399242877960205, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "4_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "4_pen_0", "position": [72.2, 17.0, 1.9], "size": [4.2, 11.2, 1.4], "rotation": [0.168966606259346, -0.9829835295677185, -0.05870464816689491, 0.041803110390901566], "z_rotation": 0.3445231020450592, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "5_pen_1_0e8155b9bf94494f9754901c53764942", "instance": "5_pen_1", "position": [63.1, 12.6, 2.0], "size": [4.2, 13.7, 1.8], "rotation": [0.2697499394416809, -0.9601663947105408, -0.053692545741796494, 0.049320999532938004], "z_rotation": 0.5520581007003784, "moved": false, "glb": null}, {"uid": "ea636a10b9194e4e8f8f50ed20a491bf", "name": "6_lamp_0_ea636a10b9194e4e8f8f50ed20a491bf", "instance": "6_lamp_0", "position": [19.2, 53.9, 19.1], "size": [33.5, 28.9, 38.3], "rotation": [0.0, 0.0, -0.19058185815811157, 0.9816713333129883], "z_rotation": -0.38350966572761536, "moved": false, "glb": null}, {"uid": "4eb66e5c0b4f4e60b8e3e2e8e2c8b84c", "name": "7_wallet_0_4eb66e5c0b4f4e60b8e3e2e8e2c8b84c", "instance": "7_wallet_0", "position": [30.1, 21.8, 2.3], "size": [14.0, 16.3, 4.6], "rotation": [0.0, 0.0, -0.10456052422523499, 0.994518518447876], "z_rotation": -0.20950399339199066, "moved": true, "glb": null}, {"uid": "8c51d37795264cc99961417a56b3c1c0", "name": "8_speaker_1_8c51d37795264cc99961417a56b3c1c0", "instance": "8_speaker_1", "position": [98.2, 45.5, 16.7], "size": [5.5, 5.5, 4.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "9_pencil_holder_0_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "9_pencil_holder_0", "position": [30.1, 37.3, 8.0], "size": [6.8, 10.0, 16.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}], "target": {"uid": "4eb66e5c0b4f4e60b8e3e2e8e2c8b84c", "name": "7_wallet_0_4eb66e5c0b4f4e60b8e3e2e8e2c8b84c", "instance": "7_wallet_0", "position": [39.80990219116211, 10.072197914123535, 1.9239826202392578], "size": [14.0, 16.3, 4.6], "rotation": [0.0, 0.0, 0.5891595687829401, 0.8076091499085951], "z_rotation": -0.20950399339199066, "moved": true, "glb": null}, "plan": {"object_uid": "4eb66e5c0b4f4e60b8e3e2e8e2c8b84c", "object_instance": "7_wallet_0", "position_delta": 15.230394984940647, "rotation_delta": 1.4700210395750783, "grasp_width": 0.08, "poses": [[0.30100000000000005, 0.218, 0.123], [0.30100000000000005, 0.218, 0.023], [0.30100000000000005, 0.218, 0.123], [0.3980990219116211, 0.10072197914123536, 0.11923982620239258], [0.3980990219116211, 0.10072197914123536, 0.01923982620239258], [0.3980990219116211, 0.10072197914123536, 0.11923982620239258]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
