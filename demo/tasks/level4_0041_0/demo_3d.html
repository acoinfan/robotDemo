<html lang="en">
<head>
  <meta charset="utf-8">

  <title>MesaTask 3D Demo - level4_0041_0</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }

    input { flex: 1; accent-color: #2f6fed; }

</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {

    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0041_0", "boundary": [0.0, 122.3, 0.0, 65.8], "objects": [{"uid": "06708e597c60482d92161fe3cf770cf6", "name": "10_pen_1_06708e597c60482d92161fe3cf770cf6", "instance": "10_pen_1", "position": [95.2, 15.5, 5.5], "size": [1.6, 15.4, 1.4], "rotation": [0.0005088497418910265, -0.03644130751490593, 0.03827086463570595, 0.9986026287078857], "z_rotation": 0.07667616009712219, "moved": false, "glb": null}, {"uid": "dfb60be05b914116b7178579e93516ed", "name": "12_pens_0_dfb60be05b914116b7178579e93516ed", "instance": "12_pens_0", "position": [34.2, 49.4, 0.2], "size": [0.6, 10.0, 0.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "acbd811c2a8b4581ba3c7716aa316878", "name": "13_pen_2_acbd811c2a8b4581ba3c7716aa316878", "instance": "13_pen_2", "position": [114.4, 52.9, -13.6], "size": [0.8, 14.0, 0.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "14_notebook_1_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "14_notebook_1", "position": [91.9, 17.8, 3.0], "size": [21.4, 24.5, 5.9], "rotation": [0.0, 0.0019062203355133533, 0.0, 0.9999982118606567], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_335ab012-6c35-413c-882b-425a7975d7a6", "name": "15_holder_1_gen_335ab012-6c35-413c-882b-425a7975d7a6", "instance": "15_holder_1", "position": [29.4, 49.9, 8.2], "size": [8.8, 8.8, 16.6], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "9ebe03b486334d2696b974f9e58afd40", "name": "18_books_0_9ebe03b486334d2696b974f9e58afd40", "instance": "18_books_0", "position": [11.3, 49.4, 11.5], "size": [18.5, 6.6, 23.0], "rotation": [-0.4939773678779602, 0.49552181363105774, -0.5084407925605774, 0.5019287467002869], "z_rotation": -1.5789042711257935, "moved": true, "glb": null}, {"uid": "7fbe17a5a5dd41538c81c4ad8a5083cf", "name": "1_laptop_0_7fbe17a5a5dd41538c81c4ad8a5083cf", "instance": "1_laptop_0", "position": [58.9, 30.7, 11.4], "size": [41.2, 29.6, 22.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "1eefa14f8d9547938a290617fda52959", "name": "2_desktop_lamp_0_1eefa14f8d9547938a290617fda52959", "instance": "2_desktop_lamp_0", "position": [101.5, 46.2, 31.6], "size": [29.5, 46.8, 62.9], "rotation": [0.0007123950053937733, -0.0010415781289339066, -0.5645405054092407, 0.8254044055938721], "z_rotation": -1.199755072593689, "moved": false, "glb": null}, {"uid": "3923dbced4e64a479efcad63ba8e3e03", "name": "3_smartphone_0_3923dbced4e64a479efcad63ba8e3e03", "instance": "3_smartphone_0", "position": [32.0, 19.3, 0.2], "size": [8.5, 17.3, 0.8], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "99deaafa70c44119ae1201df62f1b116", "name": "4_pot_plant_0_99deaafa70c44119ae1201df62f1b116", "instance": "4_pot_plant_0", "position": [20.4, 48.0, 7.2], "size": [13.7, 12.8, 14.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "1837d78daced47449446437ea2b8d196", "name": "5_container_0_1837d78daced47449446437ea2b8d196", "instance": "5_container_0", "position": [87.1, 43.6, 4.1], "size": [5.6, 5.6, 8.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0da2d6c0-a4ea-4724-b6fe-38a743925a51", "name": "6_notebook_0_0da2d6c0-a4ea-4724-b6fe-38a743925a51", "instance": "6_notebook_0", "position": [16.9, 20.2, 2.3], "size": [18.5, 24.4, 4.3], "rotation": [0.0, -0.012987440451979637, 0.0, 0.9999156594276428], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "8_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "8_pen_0", "position": [92.4, 15.2, 5.9], "size": [6.1, 11.8, 2.0], "rotation": [-0.06958364695310593, 0.002714858390390873, -0.17754913866519928, 0.9816451072692871], "z_rotation": -0.35652923583984375, "moved": false, "glb": null}], "target": {"uid": "9ebe03b486334d2696b974f9e58afd40", "name": "18_books_0_9ebe03b486334d2696b974f9e58afd40", "instance": "18_books_0", "position": [-64.08030700683594, 53.34463882446289, 11.59999942779541], "size": [18.5, 6.6, 23.0], "rotation": [0.34741860007229547, 0.08806107959082178, -0.7511923292798048, 0.5543064558674079], "z_rotation": -1.5789042711257935, "moved": true, "glb": null}, "plan": {"object_uid": "9ebe03b486334d2696b974f9e58afd40", "object_instance": "18_books_0", "position_delta": 75.48351382776147, "rotation_delta": 2.019249578222813, "grasp_width": 0.05280000000000001, "poses": [[0.113, 0.494, 0.21500000000000002], [0.113, 0.494, 0.115], [0.113, 0.494, 0.21500000000000002], [-0.6408030700683593, 0.5334463882446289, 0.2159999942779541], [-0.6408030700683593, 0.5334463882446289, 0.1159999942779541], [-0.6408030700683593, 0.5334463882446289, 0.2159999942779541]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
