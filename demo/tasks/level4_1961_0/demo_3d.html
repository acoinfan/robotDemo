<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_1961_0</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_1961_0", "boundary": [0.0, 105.0, 0.0, 54.3], "objects": [{"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "10_sticky_notes_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "10_sticky_notes_0", "position": [85.7, 20.3, 1.4], "size": [17.1, 17.2, 2.6], "rotation": [0.04769887775182724, -0.04788656160235405, 0.7068735957145691, 0.7041032910346985], "z_rotation": 1.5747593641281128, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "11_pen_2_0e8155b9bf94494f9754901c53764942", "instance": "11_pen_2", "position": [97.3, 19.1, 0.7], "size": [3.5, 9.4, 1.2], "rotation": [0.009857305325567722, -0.059101514518260956, 0.9846026301383972, 0.16421791911125183], "z_rotation": 2.8132688999176025, "moved": false, "glb": null}, {"uid": "1ffe87b871804859ae741ec97942649d", "name": "12_mug_1_1ffe87b871804859ae741ec97942649d", "instance": "12_mug_1", "position": [98.0, 46.6, 4.8], "size": [11.7, 7.2, 9.3], "rotation": [0.00626810546964407, 0.0001966068084584549, -0.9935574531555176, 0.11315591633319855], "z_rotation": -2.9147841930389404, "moved": false, "glb": null}, {"uid": "04eeeca688074aa19a9c94e596b04e33", "name": "13_plant_1_04eeeca688074aa19a9c94e596b04e33", "instance": "13_plant_1", "position": [77.0, 40.3, 10.2], "size": [16.5, 16.7, 20.1], "rotation": [0.0, 0.0, -0.2585310935974121, 0.9660029411315918], "z_rotation": -0.523002564907074, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "14_pen_3_0e8155b9bf94494f9754901c53764942", "instance": "14_pen_3", "position": [86.2, 44.2, 0.8], "size": [4.0, 10.7, 1.3], "rotation": [0.02382865734398365, -0.056909192353487015, 0.9800163507461548, 0.18910710513591766], "z_rotation": 2.763871192932129, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "15_pen_4_0e8155b9bf94494f9754901c53764942", "instance": "15_pen_4", "position": [90.4, 44.1, 0.9], "size": [3.9, 10.4, 1.3], "rotation": [0.012139596976339817, -0.06311295181512833, 0.9799690246582031, 0.18849439918994904], "z_rotation": 2.7643890380859375, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "16_pen_5_0e8155b9bf94494f9754901c53764942", "instance": "16_pen_5", "position": [88.2, 44.4, 1.0], "size": [3.8, 10.3, 1.3], "rotation": [0.025744611397385597, -0.06025753542780876, 0.9778056740760803, 0.19900330901145935], "z_rotation": 2.744063377380371, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "1_laptop_0_ef18ca96fff24272916d706db1f63d5a", "instance": "1_laptop_0", "position": [49.4, 27.9, 14.4], "size": [36.1, 35.5, 28.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e0058d59ac714df898d10ff56198a117", "name": "2_lamp_0_e0058d59ac714df898d10ff56198a117", "instance": "2_lamp_0", "position": [17.3, 42.3, 19.8], "size": [15.1, 27.0, 39.6], "rotation": [0.0, 0.0, 0.5628107786178589, 0.8265857696533203], "z_rotation": 1.1955647468566895, "moved": false, "glb": null}, {"uid": "0adcf1771a3c4b5c922c47dd09d149b0", "name": "3_stapler_0_0adcf1771a3c4b5c922c47dd09d149b0", "instance": "3_stapler_0", "position": [95.5, 37.4, 2.7], "size": [2.3, 13.7, 5.1], "rotation": [0.0, 0.0, -0.5209217667579651, 0.8536044359207153], "z_rotation": -1.0958609580993652, "moved": false, "glb": null}, {"uid": "3462bfabdc95464fac0f91fa458fea94", "name": "5_mug_0_3462bfabdc95464fac0f91fa458fea94", "instance": "5_mug_0", "position": [7.5, 32.3, 4.4], "size": [9.1, 6.2, 8.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "7_notebook_0_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "7_notebook_0", "position": [18.2, 24.3, 0.6], "size": [13.6, 18.3, 1.2], "rotation": [0.0, 0.0, -0.38224586844444275, 0.9240606427192688], "z_rotation": -0.7844510674476624, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "8_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "8_pen_0", "position": [25.8, 14.2, 0.8], "size": [4.1, 11.1, 1.4], "rotation": [-0.05598805099725723, -0.009156439453363419, -0.1611386239528656, 0.9852998852729797], "z_rotation": -0.3222702443599701, "moved": false, "glb": null}, {"uid": "8d4857932fba4a65a286ec60751c5201", "name": "9_pen_1_8d4857932fba4a65a286ec60751c5201", "instance": "9_pen_1", "position": [72.3, 20.1, 0.6], "size": [1.2, 12.0, 1.1], "rotation": [0.0, 0.0, -0.9997132420539856, 0.02394685335457325], "z_rotation": -3.0936944484710693, "moved": false, "glb": null}], "target": {"uid": "3462bfabdc95464fac0f91fa458fea94", "name": "5_mug_0_3462bfabdc95464fac0f91fa458fea94", "instance": "5_mug_0", "position": [21.34058952331543, 24.37922477722168, 5.490718841552734], "size": [9.1, 6.2, 8.5], "rotation": [0.0635833642041085, -0.212400295242677, -0.33442489769448863, 0.9159712103441582], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "3462bfabdc95464fac0f91fa458fea94", "object_instance": "5_mug_0", "position_delta": 15.984062877566702, "rotation_delta": 0.8257491124977576, "grasp_width": 0.049600000000000005, "poses": [[0.075, 0.32299999999999995, 0.14400000000000002], [0.075, 0.32299999999999995, 0.044000000000000004], [0.075, 0.32299999999999995, 0.14400000000000002], [0.2134058952331543, 0.2437922477722168, 0.15490718841552736], [0.2134058952331543, 0.2437922477722168, 0.054907188415527344], [0.2134058952331543, 0.2437922477722168, 0.15490718841552736]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
