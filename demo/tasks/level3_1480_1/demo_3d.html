<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level3_1480_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level3_1480_1", "boundary": [0.0, 104.5, 0.0, 65.9], "objects": [{"uid": "0e8155b9bf94494f9754901c53764942", "name": "10_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "10_pen_0", "position": [39.0, 14.8, 3.7], "size": [5.3, 12.5, 1.6], "rotation": [0.15499725937843323, -0.9467849731445312, -0.09341545403003693, 0.26617228984832764], "z_rotation": 0.4006870687007904, "moved": false, "glb": null}, {"uid": "gen_335ab012-6c35-413c-882b-425a7975d7a6", "name": "12_pencil_holder_0_gen_335ab012-6c35-413c-882b-425a7975d7a6", "instance": "12_pencil_holder_0", "position": [85.0, 48.0, 9.5], "size": [10.1, 10.1, 19.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "617aa06ab1274fd78275a573c963e893", "name": "13_glass_0_617aa06ab1274fd78275a573c963e893", "instance": "13_glass_0", "position": [78.5, 33.1, 5.0], "size": [6.7, 6.7, 10.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "7fbe17a5a5dd41538c81c4ad8a5083cf", "name": "1_laptop_0_7fbe17a5a5dd41538c81c4ad8a5083cf", "instance": "1_laptop_0", "position": [55.8, 42.8, 10.6], "size": [33.7, 25.1, 21.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e0058d59ac714df898d10ff56198a117", "name": "2_desk_lamp_0_e0058d59ac714df898d10ff56198a117", "instance": "2_desk_lamp_0", "position": [18.0, 46.1, 19.9], "size": [15.2, 27.2, 39.8], "rotation": [0.0, 0.0, 0.5948728919029236, 0.8038197755813599], "z_rotation": 1.2742149829864502, "moved": false, "glb": null}, {"uid": "bd41c78c5d9246b08cd01364ec6ac8f8", "name": "3_glasses_0_bd41c78c5d9246b08cd01364ec6ac8f8", "instance": "3_glasses_0", "position": [28.7, 32.2, 2.2], "size": [12.5, 13.8, 4.4], "rotation": [-0.047157518565654755, -0.011664598248898983, 0.23983384668827057, 0.9695977568626404], "z_rotation": 0.4849734604358673, "moved": true, "glb": null}, {"uid": "ac265d6dd72f483e9377a1da57c3038a", "name": "4_plant_0_ac265d6dd72f483e9377a1da57c3038a", "instance": "4_plant_0", "position": [30.4, 47.8, 7.9], "size": [9.5, 9.5, 16.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "37ea9b0da02c4263a25dec853d54aca0", "name": "5_headphones_0_37ea9b0da02c4263a25dec853d54aca0", "instance": "5_headphones_0", "position": [27.8, 15.5, 2.5], "size": [11.3, 13.3, 5.0], "rotation": [0.5373392701148987, -0.5376307368278503, -0.45959144830703735, 0.4593423902988434], "z_rotation": -1.5713385343551636, "moved": false, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "7_mouse_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "7_mouse_0", "position": [73.3, 17.3, 0.7], "size": [5.0, 8.6, 1.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "383b21cc-72c5-4e3c-8e74-ee559e26b3f8", "name": "8_notebook_0_383b21cc-72c5-4e3c-8e74-ee559e26b3f8", "instance": "8_notebook_0", "position": [55.8, 16.9, 1.3], "size": [17.0, 20.8, 2.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_a3fd1be6-3ece-4350-829c-e466b0750646", "name": "9_binder_0_gen_a3fd1be6-3ece-4350-829c-e466b0750646", "instance": "9_binder_0", "position": [94.9, 49.0, 14.5], "size": [26.6, 7.2, 29.2], "rotation": [0.0, 0.0, 0.7146158814430237, 0.6995170712471008], "z_rotation": 1.5921496152877808, "moved": false, "glb": null}], "target": {"uid": "bd41c78c5d9246b08cd01364ec6ac8f8", "name": "3_glasses_0_bd41c78c5d9246b08cd01364ec6ac8f8", "instance": "3_glasses_0", "position": [9.548870086669922, 28.00677490234375, 1.5273985862731934], "size": [12.5, 13.8, 4.4], "rotation": [0.0, 0.0, -0.9506926818194266, 0.3058801154540996], "z_rotation": 0.4849734604358673, "moved": true, "glb": null}, "plan": {"object_uid": "bd41c78c5d9246b08cd01364ec6ac8f8", "object_instance": "3_glasses_0", "position_delta": 19.616353033594386, "rotation_delta": 3.0041596699202997, "grasp_width": 0.08, "poses": [[0.287, 0.322, 0.12200000000000001], [0.287, 0.322, 0.022000000000000002], [0.287, 0.322, 0.12200000000000001], [0.09548870086669922, 0.2800677490234375, 0.11527398586273194], [0.09548870086669922, 0.2800677490234375, 0.015273985862731933], [0.09548870086669922, 0.2800677490234375, 0.11527398586273194]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
</html>
