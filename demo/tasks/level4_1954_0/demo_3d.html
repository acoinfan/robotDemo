  <style>

<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>

    <p><b>Move:</b> <span id="move"></span></p>

  <script type="importmap">

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_1954_0", "boundary": [0.0, 112.8, 0.0, 101.8], "objects": [{"uid": "gen_39647c11-3911-439b-88a3-f898aeed7493", "name": "10_pen_holder_1_gen_39647c11-3911-439b-88a3-f898aeed7493", "instance": "10_pen_holder_1", "position": [97.6, 85.8, 12.8], "size": [10.6, 15.4, 25.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "6175714452734f86b6b996ac130840a4", "name": "11_plate_1_6175714452734f86b6b996ac130840a4", "instance": "11_plate_1", "position": [99.7, 60.6, 0.5], "size": [9.3, 9.3, 0.3], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "12_sticky_note_1_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "12_sticky_note_1", "position": [31.5, 52.3, 1.0], "size": [5.1, 5.1, 1.3], "rotation": [0.0, 0.0, 0.5027207136154175, 0.8644489049911499], "z_rotation": 1.0534864664077759, "moved": false, "glb": null}, {"uid": "gen_a29c7f71-7eb7-4f75-b1f4-ef2375ca1dda", "name": "16_file_folder_1_gen_a29c7f71-7eb7-4f75-b1f4-ef2375ca1dda", "instance": "16_file_folder_1", "position": [17.3, 83.4, 11.5], "size": [5.6, 20.8, 22.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "17_notebook_0_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "17_notebook_0", "position": [25.1, 33.4, 3.7], "size": [26.1, 29.9, 7.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_a29c7f71-7eb7-4f75-b1f4-ef2375ca1dda", "name": "18_file_folder_2_gen_a29c7f71-7eb7-4f75-b1f4-ef2375ca1dda", "instance": "18_file_folder_2", "position": [23.4, 83.2, 11.8], "size": [5.6, 21.0, 22.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "a820c3cc463a4ee49b87e1e9a4029abc", "name": "19_notebook_1_a820c3cc463a4ee49b87e1e9a4029abc", "instance": "19_notebook_1", "position": [92.3, 22.6, 3.2], "size": [23.4, 26.7, 6.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "212f2713f3704907a2ca16c1546cb8f7", "name": "1_mouse_0_212f2713f3704907a2ca16c1546cb8f7", "instance": "1_mouse_0", "position": [83.7, 49.6, 1.8], "size": [5.9, 9.0, 3.7], "rotation": [0.0, 0.0, 0.10476106405258179, 0.9944974184036255], "z_rotation": 0.20990727841854095, "moved": false, "glb": null}, {"uid": "d17b8f44d1544364b8ad9fe2554ddfdf", "name": "2_water_bottle_0_d17b8f44d1544364b8ad9fe2554ddfdf", "instance": "2_water_bottle_0", "position": [13.9, 55.5, 7.5], "size": [5.4, 5.4, 14.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "489266e9e2c44b5fbba13b2d933956f8", "name": "3_clock_0_489266e9e2c44b5fbba13b2d933956f8", "instance": "3_clock_0", "position": [80.5, 73.1, 6.9], "size": [12.5, 7.8, 13.9], "rotation": [0.0, 0.0, 0.016544241458177567, 0.9998631477355957], "z_rotation": 0.03308999165892601, "moved": false, "glb": null}, {"uid": "d17b8f44d1544364b8ad9fe2554ddfdf", "name": "4_glass_0_d17b8f44d1544364b8ad9fe2554ddfdf", "instance": "4_glass_0", "position": [99.5, 60.6, 6.2], "size": [4.0, 4.0, 11.2], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "f63992432ee743858052ecffe369d98a", "name": "5_plate_0_f63992432ee743858052ecffe369d98a", "instance": "5_plate_0", "position": [39.5, 81.3, 0.8], "size": [13.4, 13.4, 1.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "6_computer_0_ef18ca96fff24272916d706db1f63d5a", "instance": "6_computer_0", "position": [56.5, 60.8, 13.4], "size": [33.4, 33.0, 26.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "7_sticky_note_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "7_sticky_note_0", "position": [30.6, 32.6, 6.6], "size": [7.8, 7.8, 1.1], "rotation": [0.049256280064582825, -0.04864679276943207, 0.7010055184364319, 0.7097877264022827], "z_rotation": 1.5582259893417358, "moved": false, "glb": null}, {"uid": "26e240e2-8949-4c4f-aa03-05710a6261d2", "name": "8_file_notebook_0_26e240e2-8949-4c4f-aa03-05710a6261d2", "instance": "8_file_notebook_0", "position": [56.3, 22.1, 1.4], "size": [26.6, 35.8, 2.2], "rotation": [0.0, 0.0, 0.9999961256980896, 0.002776579698547721], "z_rotation": 3.1360394954681396, "moved": false, "glb": null}], "target": {"uid": "gen_a29c7f71-7eb7-4f75-b1f4-ef2375ca1dda", "name": "18_file_folder_2_gen_a29c7f71-7eb7-4f75-b1f4-ef2375ca1dda", "instance": "18_file_folder_2", "position": [38.030086517333984, 59.6041374206543, 11.446245193481445], "size": [5.6, 21.0, 22.9], "rotation": [0.0, 0.0, 0.0, 0.9999412901185755], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "gen_a29c7f71-7eb7-4f75-b1f4-ef2375ca1dda", "object_instance": "18_file_folder_2", "position_delta": 27.765613712489404, "rotation_delta": 0.0, "grasp_width": 0.0448, "poses": [[0.23399999999999999, 0.8320000000000001, 0.21800000000000003], [0.23399999999999999, 0.8320000000000001, 0.11800000000000001], [0.23399999999999999, 0.8320000000000001, 0.21800000000000003], [0.38030086517333983, 0.596041374206543, 0.21446245193481445], [0.38030086517333983, 0.596041374206543, 0.11446245193481445], [0.38030086517333983, 0.596041374206543, 0.21446245193481445]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
