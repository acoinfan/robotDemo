<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_1192_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_1192_1", "boundary": [0.0, 116.4, 0.0, 66.5], "objects": [{"uid": "294ec43202534b2fb3d88ae69a1e32cb", "name": "11_desk_lamp_0_294ec43202534b2fb3d88ae69a1e32cb", "instance": "11_desk_lamp_0", "position": [99.6, 18.2, 14.2], "size": [7.8, 25.9, 28.2], "rotation": [0.0, 0.0, -0.8508080244064331, 0.5254766345024109], "z_rotation": -2.0350422859191895, "moved": false, "glb": null}, {"uid": "0e8155b9bf94494f9754901c53764942", "name": "12_pen_0_0e8155b9bf94494f9754901c53764942", "instance": "12_pen_0", "position": [33.6, 12.7, 1.7], "size": [2.9, 7.7, 1.0], "rotation": [-0.04810900613665581, 0.0, 0.0, 0.9988421201705933], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "13_sticky_notes_1_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "13_sticky_notes_1", "position": [74.8, 38.9, 0.6], "size": [6.7, 6.8, 1.2], "rotation": [-0.007038971409201622, -0.06317025423049927, 0.11051955074071884, 0.9918394088745117], "z_rotation": 0.22369064390659332, "moved": true, "glb": null}, {"uid": "613bee00bd624ebe9592061d1b09520b", "name": "14_headphone_0_613bee00bd624ebe9592061d1b09520b", "instance": "14_headphone_0", "position": [10.2, 53.5, 2.2], "size": [9.6, 11.6, 4.3], "rotation": [0.0, 0.0, 0.34657004475593567, 0.93802410364151], "z_rotation": 0.7078241109848022, "moved": false, "glb": null}, {"uid": "d0271cf7-076d-4939-9a0d-8856c79dc3dc", "name": "16_mouse_1_d0271cf7-076d-4939-9a0d-8856c79dc3dc", "instance": "16_mouse_1", "position": [69.7, 44.2, 1.3], "size": [4.3, 6.6, 2.6], "rotation": [0.0, 0.0, 0.9574816823005676, 0.2884940505027771], "z_rotation": 2.5562853813171387, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "19_sticky_notes_2_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "19_sticky_notes_2", "position": [86.5, 36.6, 1.0], "size": [12.8, 13.0, 1.8], "rotation": [0.0, -0.07425525039434433, 0.0, 0.9972392916679382], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "c1643b57199a4d90ae00202fad07123e", "name": "1_cup_0_c1643b57199a4d90ae00202fad07123e", "instance": "1_cup_0", "position": [59.3, 10.9, 5.8], "size": [4.9, 4.9, 11.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_335ab012-6c35-413c-882b-425a7975d7a6", "name": "2_cup_1_gen_335ab012-6c35-413c-882b-425a7975d7a6", "instance": "2_cup_1", "position": [74.2, 61.3, 6.0], "size": [6.2, 6.2, 11.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "947419b57868497f9d019d8a6a2a8073", "name": "4_cup_2_947419b57868497f9d019d8a6a2a8073", "instance": "4_cup_2", "position": [63.4, 51.0, 3.4], "size": [8.4, 6.2, 6.7], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "212f2713f3704907a2ca16c1546cb8f7", "name": "5_mouse_0_212f2713f3704907a2ca16c1546cb8f7", "instance": "5_mouse_0", "position": [61.6, 31.9, 1.2], "size": [3.8, 5.8, 2.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "b0fdda96fcb94002b8be3077f5b95299", "name": "6_scissors_0_b0fdda96fcb94002b8be3077f5b95299", "instance": "6_scissors_0", "position": [14.0, 36.1, 0.2], "size": [7.8, 12.5, 0.6], "rotation": [0.6271281838417053, 0.32423651218414307, 0.3252633512020111, 0.6291142106056213], "z_rotation": 0.9543381929397583, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "7_laptop_0_ef18ca96fff24272916d706db1f63d5a", "instance": "7_laptop_0", "position": [39.0, 42.8, 14.0], "size": [35.5, 34.9, 28.0], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "7bfa596d1cfe44d298243636a0b611fc", "name": "8_notebook_0_7bfa596d1cfe44d298243636a0b611fc", "instance": "8_notebook_0", "position": [29.4, 11.4, 0.7], "size": [19.6, 25.1, 1.6], "rotation": [0.022292278707027435, 0.010382261127233505, 0.7008185386657715, 0.7129155397415161], "z_rotation": 1.5533020496368408, "moved": false, "glb": null}, {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "9_sticky_notes_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "9_sticky_notes_0", "position": [103.1, 35.8, 1.4], "size": [19.4, 19.7, 2.9], "rotation": [0.0, -0.06943365931510925, 0.0, 0.9975865483283997], "z_rotation": 0.0, "moved": true, "glb": null}], "target": {"uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "name": "9_sticky_notes_0_0c89c545d39d43b28c9ce60cedfc0fb8", "instance": "9_sticky_notes_0", "position": [71.8084487915039, 32.69509506225586, 3.4914259910583496], "size": [19.4, 19.7, 2.9], "rotation": [-0.6313568288212126, 0.7534593275107796, -0.09731208027140335, 0.15562119239061767], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "0c89c545d39d43b28c9ce60cedfc0fb8", "object_instance": "9_sticky_notes_0", "position_delta": 31.514689818915166, "rotation_delta": 2.9353670630164044, "grasp_width": 0.08, "poses": [[1.031, 0.358, 0.114], [1.031, 0.358, 0.013999999999999999], [1.031, 0.358, 0.114], [0.7180844879150391, 0.3269509506225586, 0.1349142599105835], [0.7180844879150391, 0.3269509506225586, 0.034914259910583494], [0.7180844879150391, 0.3269509506225586, 0.1349142599105835]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
