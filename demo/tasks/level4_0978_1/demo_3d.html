<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MesaTask 3D Demo - level4_0978_1</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: #dfe4e8; }
    #info { position: fixed; top: 14px; left: 14px; z-index: 2; width: min(360px, calc(100vw - 28px)); padding: 12px; background: rgba(248, 250, 252, 0.92); border: 1px solid #c8d1dc; border-radius: 8px; color: #17202a; }
    #info h1 { margin: 0 0 8px; font-size: 16px; }
    #info p { margin: 5px 0; font-size: 13px; line-height: 1.35; }
    #bar { position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 2; display: flex; gap: 10px; align-items: center; }
    button { min-width: 84px; min-height: 36px; border: 0; border-radius: 6px; background: #2f6fed; color: white; font-weight: 700; cursor: pointer; }
    input { flex: 1; accent-color: #2f6fed; }
  </style>
</head>
<body>
  <div id="info">
    <h1>MesaTask 3D Pick Demo</h1>
    <p><b>Task:</b> <span id="task"></span></p>
    <p><b>Object:</b> <span id="object"></span></p>
    <p><b>Move:</b> <span id="move"></span></p>
    <p><b>Assets:</b> real GLB when available, size boxes otherwise.</p>
  </div>
  <div id="bar">
    <button id="play">Play</button>
    <input id="time" type="range" min="0" max="1000" value="0">
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const data = {"task": "level4_0978_1", "boundary": [0.0, 127.3, 0.0, 75.3], "objects": [{"uid": "88dc32e383b243c1913bde9dd42f9200", "name": "10_headphone_0_88dc32e383b243c1913bde9dd42f9200", "instance": "10_headphone_0", "position": [100.5, 43.5, 3.8], "size": [14.0, 15.8, 8.5], "rotation": [0.5869916677474976, 0.4561171233654022, 0.40377721190452576, 0.5332559943199158], "z_rotation": 1.3099874258041382, "moved": false, "glb": null}, {"uid": "ef18ca96fff24272916d706db1f63d5a", "name": "11_computer_0_ef18ca96fff24272916d706db1f63d5a", "instance": "11_computer_0", "position": [68.0, 45.4, 15.0], "size": [35.4, 34.7, 27.9], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "88dc32e383b243c1913bde9dd42f9200", "name": "12_head_0_88dc32e383b243c1913bde9dd42f9200", "instance": "12_head_0", "position": [38.1, 39.3, 4.1], "size": [14.4, 16.2, 8.7], "rotation": [0.371383398771286, -0.6527308821678162, -0.5636976957321167, 0.34389200806617737], "z_rotation": -2.0804195404052734, "moved": false, "glb": null}, {"uid": "20672907a94c4233968e4281bc2f35da", "name": "13_globe_1_20672907a94c4233968e4281bc2f35da", "instance": "13_globe_1", "position": [115.9, 62.6, 11.1], "size": [22.4, 22.4, 22.4], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": true, "glb": null}, {"uid": "gen_a3fd1be6-3ece-4350-829c-e466b0750646", "name": "14_binders_1_gen_a3fd1be6-3ece-4350-829c-e466b0750646", "instance": "14_binders_1", "position": [25.9, 62.6, 1.5], "size": [19.9, 5.5, 21.8], "rotation": [-0.6988246440887451, -0.7152898907661438, 0.0021235716994851828, 0.0002195490087615326], "z_rotation": -1.5475058555603027, "moved": false, "glb": null}, {"uid": "40693d5e611b462b941aabeefc6884bc", "name": "15_stress_ball_0_40693d5e611b462b941aabeefc6884bc", "instance": "15_stress_ball_0", "position": [44.0, 51.0, 4.6], "size": [9.5, 9.5, 9.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "gen_5730a550-65d7-4148-ae84-0acb6134e374", "name": "16_binders_2_gen_5730a550-65d7-4148-ae84-0acb6134e374", "instance": "16_binders_2", "position": [19.7, 62.0, 2.7], "size": [18.2, 7.3, 22.4], "rotation": [-0.009736169129610062, -0.004931729752570391, 0.7133752107620239, 0.7006973028182983], "z_rotation": 1.5886547565460205, "moved": false, "glb": null}, {"uid": "e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "name": "1_mouse_0_e3818e10-f7c7-4bdd-8dca-392bfa0aa853", "instance": "1_mouse_0", "position": [92.1, 17.8, 0.8], "size": [5.5, 10.5, 2.0], "rotation": [0.0, 0.0, 0.017107892781496048, 0.9998536705970764], "z_rotation": 0.034217458218336105, "moved": false, "glb": null}, {"uid": "9cad169b913545f683ae2a27080ca270", "name": "2_keyboard_0_9cad169b913545f683ae2a27080ca270", "instance": "2_keyboard_0", "position": [67.2, 17.6, 1.0], "size": [31.2, 10.6, 2.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "e0058d59ac714df898d10ff56198a117", "name": "3_lamp_0_e0058d59ac714df898d10ff56198a117", "instance": "3_lamp_0", "position": [14.8, 40.9, 21.3], "size": [16.5, 29.5, 43.3], "rotation": [0.0, 0.0, 0.748823344707489, 0.662769615650177], "z_rotation": 1.6925698518753052, "moved": false, "glb": null}, {"uid": "d17b8f44d1544364b8ad9fe2554ddfdf", "name": "4_water_bottle_0_d17b8f44d1544364b8ad9fe2554ddfdf", "instance": "4_water_bottle_0", "position": [115.5, 47.6, 8.0], "size": [5.9, 5.9, 16.1], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "489266e9e2c44b5fbba13b2d933956f8", "name": "5_clock_0_489266e9e2c44b5fbba13b2d933956f8", "instance": "5_clock_0", "position": [97.7, 65.0, 6.6], "size": [11.8, 7.4, 13.2], "rotation": [0.0, 0.0, 0.007269623689353466, 0.9999735951423645], "z_rotation": 0.014539375901222229, "moved": false, "glb": null}, {"uid": "5899d997-4d52-4918-97b5-32195cbe58fb", "name": "7_notepad_0_5899d997-4d52-4918-97b5-32195cbe58fb", "instance": "7_notepad_0", "position": [36.3, 16.0, 1.1], "size": [20.6, 26.2, 2.5], "rotation": [0.0, 0.0, 0.0, 1.0], "z_rotation": 0.0, "moved": false, "glb": null}, {"uid": "1377778b07044ab3826b41412f230c5a", "name": "9_binders_0_1377778b07044ab3826b41412f230c5a", "instance": "9_binders_0", "position": [39.3, 59.1, 4.3], "size": [13.2, 8.1, 8.3], "rotation": [0.0, 0.0, 0.2001851201057434, 0.979758083820343], "z_rotation": 0.40309372544288635, "moved": false, "glb": null}], "target": {"uid": "20672907a94c4233968e4281bc2f35da", "name": "13_globe_1_20672907a94c4233968e4281bc2f35da", "instance": "13_globe_1", "position": [35.57938766479492, 20.68691635131836, 13.472394943237305], "size": [22.4, 22.4, 22.4], "rotation": [-0.47984237940054414, -0.4857454952098957, 0.6138799691114774, 0.39617418938922444], "z_rotation": 0.0, "moved": true, "glb": null}, "plan": {"object_uid": "20672907a94c4233968e4281bc2f35da", "object_instance": "13_globe_1", "position_delta": 90.62966183656641, "rotation_delta": 2.3268999978202607, "grasp_width": 0.08, "poses": [[1.159, 0.626, 0.21100000000000002], [1.159, 0.626, 0.111], [1.159, 0.626, 0.21100000000000002], [0.3557938766479492, 0.2068691635131836, 0.23472394943237307], [0.3557938766479492, 0.2068691635131836, 0.13472394943237306], [0.3557938766479492, 0.2068691635131836, 0.23472394943237307]]}};
    const CM = 0.01;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe4e8);

    const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.01, 20);
    camera.position.set(0.65, -1.05, 0.72);
    camera.lookAt(0.34, 0.32, 0.04);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.34, 0.32, 0.04);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8b8f96, 1.8));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(1.8, -1.4, 2.2);
    scene.add(sun);

    const table = buildTable(data.boundary);
    scene.add(table);
    scene.add(new THREE.GridHelper(0.8, 16, 0x8090a0, 0xb7c0ca));

    const loader = new GLTFLoader();
    const objects = new Map();
    const targetMarker = buildTargetMarker(data.target);
    scene.add(targetMarker);

    for (const obj of data.objects) {
      const mesh = buildBoxObject(obj);
      objects.set(obj.uid, mesh);
      scene.add(mesh);
      if (obj.glb) {
        loader.load(obj.glb, (gltf) => {
          fitLoadedAsset(gltf.scene, obj);
          scene.remove(mesh);
          objects.set(obj.uid, gltf.scene);
          scene.add(gltf.scene);
        });
      }
    }

    const gripper = buildGripper();
    scene.add(gripper);
    const path = buildPath(data.plan.poses);
    scene.add(path);

    document.getElementById("task").textContent = data.task;
    document.getElementById("object").textContent = data.plan.object_instance;
    document.getElementById("move").textContent = data.plan.position_delta.toFixed(2) + " cm";

    const play = document.getElementById("play");
    const time = document.getElementById("time");
    let playing = false;
    let progress = 0;
    let last = 0;

    play.addEventListener("click", () => {
      if (progress >= 1) progress = 0;
      playing = !playing;
      play.textContent = playing ? "Pause" : "Play";
    });
    time.addEventListener("input", () => {
      progress = Number(time.value) / 1000;
      playing = false;
      play.textContent = "Play";
      updateAnimation();
    });

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);

    function loop(ts) {
      const dt = Math.min(ts - last, 48);
      last = ts;
      if (playing) {
        progress += dt / 6500;
        if (progress >= 1) {
          progress = 1;
          playing = false;
          play.textContent = "Play";
        }
        time.value = Math.round(progress * 1000);
      }
      updateAnimation();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function updateAnimation() {
      const p = gripperPosition(progress);
      gripper.position.set(p[0], p[1], p[2]);
      const moved = objects.get(data.plan.object_uid);
      if (moved) {
        if (progress < 0.22) setObjectPose(moved, data.objects.find(o => o.uid === data.plan.object_uid).position);
        else if (progress > 0.82) setObjectPose(moved, data.target.position);
        else moved.position.set(p[0], p[1], p[2]);
      }
    }

    function buildTable(boundary) {
      const w = (boundary[1] - boundary[0]) * CM;
      const h = (boundary[3] - boundary[2]) * CM;
      const geo = new THREE.BoxGeometry(w, h, 0.018);
      const mat = new THREE.MeshStandardMaterial({ color: 0xf0e5d2, roughness: 0.82 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((boundary[0] + boundary[1]) * CM / 2, (boundary[2] + boundary[3]) * CM / 2, -0.009);
      return mesh;
    }

    function buildBoxObject(obj) {
      const color = obj.moved ? 0xf0aa35 : 0x8fa1b3;
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.65, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.obj = obj;
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function fitLoadedAsset(root, obj) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const target = new THREE.Vector3(obj.size[0] * CM, obj.size[1] * CM, obj.size[2] * CM);
      const scale = Math.min(target.x / Math.max(size.x, 1e-6), target.y / Math.max(size.y, 1e-6), target.z / Math.max(size.z, 1e-6));
      root.scale.setScalar(scale);
      setObjectPose(root, obj.position);
      root.rotation.z = obj.z_rotation || 0;
    }

    function setObjectPose(mesh, positionCm) {
      mesh.position.set(positionCm[0] * CM, positionCm[1] * CM, positionCm[2] * CM);
    }

    function buildTargetMarker(obj) {
      const geo = new THREE.BoxGeometry(Math.max(obj.size[0] * CM, 0.006), Math.max(obj.size[1] * CM, 0.006), Math.max(obj.size[2] * CM, 0.006));
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed, wireframe: true, transparent: true, opacity: 0.55 });
      const mesh = new THREE.Mesh(geo, mat);
      setObjectPose(mesh, obj.position);
      mesh.rotation.z = obj.z_rotation || 0;
      return mesh;
    }

    function buildGripper() {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: 0x1d2733, roughness: 0.45 });
      const palm = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.012, 0.012), mat);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.055, 0.014), mat);
      const right = left.clone();
      left.position.x = -0.035;
      right.position.x = 0.035;
      group.add(palm, left, right);
      return group;
    }

    function buildPath(poses) {
      const points = poses.map(p => new THREE.Vector3(p[0], p[1], p[2]));
      const curve = new THREE.CatmullRomCurve3(points);
      const geo = new THREE.TubeGeometry(curve, 80, 0.002, 8, false);
      const mat = new THREE.MeshBasicMaterial({ color: 0x2f6fed });
      return new THREE.Mesh(geo, mat);
    }

    function gripperPosition(t) {
      const poses = data.plan.poses;
      const scaled = t * (poses.length - 1);
      const i = Math.min(Math.floor(scaled), poses.length - 2);
      const local = smooth(scaled - i);
      return lerp(poses[i], poses[i + 1], local);
    }

    function lerp(a, b, t) {
      return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
    }

    function smooth(t) {
      return t * t * (3 - 2 * t);
    }
  </script>
</body>
